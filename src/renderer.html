.period-bar.is-dragging { cursor:grabbing; }
.period-label,.year-tag { color:var(--i3); }
.year-tag { background:rgba(96,165,250,.09);border-color:rgba(96,165,250,.14); }
.mbtn { color:var(--i3); padding:5px 10px; }
.mbtn:hover { background:rgba(96,165,250,.13);color:#eaf2ff;border-color:rgba(96,165,250,.22); }
.mbtn.active {
  background:linear-gradient(135deg,rgba(59,130,246,.38),rgba(139,92,246,.24));
  color:#ffffff;
  border-color:rgba(147,197,253,.48);
  box-shadow:0 8px 22px rgba(59,130,246,.22), inset 0 1px 0 rgba(255,255,255,.12);
}
.mbar-arrow {
  background:rgba(12,27,49,.76); color:#b9c8e3; border-color:rgba(170,200,255,.14);
}
.kpi-card,.table-card,.modal,.panel,.cmd-box,.analytics-card,.rank-item,.timeline-item,.cloud-indicator {
  background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
  border-color:rgba(170,200,255,.13);
  box-shadow:var(--sh1);
}
.kpi-card {
  transform-style:preserve-3d;
  box-shadow:var(--sh2);
}
.kpi-card:hover {
  transform:translateY(-4px) scale(1.01);
  border-color:rgba(96,165,250,.28);
  box-shadow:var(--sh3),0 0 34px rgba(59,130,246,.08);
}
.kpi-value { text-shadow:0 0 18px color-mix(in srgb, var(--kpi-color,var(--blue-l)) 40%, transparent); }
.kpi-label,.empty-state-text { color:var(--i3); }
.sec-hdr { color:var(--i2); }
.table-card-header {
  background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));
}
.table-card-title { color:#f6f8ff; }
thead th {
  background:rgba(14,30,54,.96);
  color:#9fb4d5;
  border-bottom-color:rgba(170,200,255,.12);
}
tbody tr { border-bottom-color:rgba(170,200,255,.055); }
tbody tr:hover { background:rgba(96,165,250,.075); }
tbody tr.clickable:hover { background:rgba(96,165,250,.105); }
tbody td { color:#c7d5ed; }
tbody td:first-child { color:#f1f6ff; }
.badge { box-shadow:inset 0 1px 0 rgba(255,255,255,.06); }
.b-gray { color:#9fb4d5; border-color:rgba(170,200,255,.12); }
.btn {
  box-shadow:0 4px 14px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.055);
  transition:transform .18s var(--ease-spring),box-shadow .18s var(--ease-std),background .18s,border-color .18s,color .18s;
}
.btn:hover { transform:translateY(-2px) scale(1.018); box-shadow:0 10px 24px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.08); }
.btn-secondary,.btn-ghost { color:#c4d3ec; border-color:rgba(170,200,255,.13); background:rgba(255,255,255,.055); }
.btn-secondary:hover,.btn-ghost:hover { color:#fff; border-color:rgba(96,165,250,.24); background:rgba(96,165,250,.11); }
.btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); box-shadow:0 10px 24px rgba(59,130,246,.24), inset 0 1px 0 rgba(255,255,255,.14); }
.fab {
  background:linear-gradient(135deg,#3b82f6,#8b5cf6)!important;
  box-shadow:0 18px 46px rgba(59,130,246,.34),0 0 0 1px rgba(255,255,255,.12) inset!important;
}
#toast { box-shadow:var(--sh3); }
.page-enter,.fade { animation:polishedPageIn .28s var(--ease-out) both; }
@keyframes polishedPageIn {
  from { opacity:0; transform:translateY(8px) scale(.999); }
  to   { opacity:1; transform:none; }
}
/* softRise removed — re-animating every card on month change was expensive */
@keyframes softRise { from{opacity:.001; transform:translateY(8px)} to{opacity:1; transform:none} }
button:focus-visible,.nav:focus-visible,.mbtn:focus-visible,.mbar-arrow:focus-visible,.btn:focus-visible {
  outline:2px solid rgba(147,197,253,.86)!important;
  outline-offset:2px;
}
@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:.01ms!important; animation-iteration-count:1!important; scroll-behavior:auto!important; transition-duration:.01ms!important; }
}

/* ── SCROLL & PAINT PERFORMANCE ─────────────────────────────────── */
/* hint scroll-position compositor on the main scroll container */
#content        { will-change:scroll-position; }
/* scope horizontal table scroll to its own paint layer */
.table-scroller { will-change:scroll-position; }
/* scope month bar scroll — avoids repainting page content on drag */
.period-bar     { will-change:scroll-position; }
/* contain paint to each card — invalidating one card doesn't repaint siblings */
.table-card     { contain:paint; }
/* sidebar and topbar on their own layers — page scroll doesn't repaint them */
#sb             { will-change:transform; }
#topbar         { will-change:transform; }

/* ── DASHBOARD PREFERENCES ──────────────────────────────────────── */
.btn-dash-prefs-topbar{
  flex-shrink:0;
  padding:3px 9px;border-radius:var(--r1);
  background:rgba(255,255,255,.06);border:1px solid var(--bd-1);
  color:var(--i3);font-size:12px;font-family:var(--sans);
  cursor:pointer;-webkit-app-region:no-drag;
  transition:background .12s,color .12s,border-color .12s;
}
.btn-dash-prefs-topbar:hover{background:rgba(255,255,255,.11);color:var(--i1);border-color:var(--bd-2)}

/* Compact mode */
body.dash-compact .kpi-card{padding:10px 12px}
body.dash-compact .kpi-icon{font-size:16px;margin-bottom:4px}
body.dash-compact .kpi-value{font-size:15px}
body.dash-compact .kpi-label{font-size:10px}
body.dash-compact .widget{padding:12px 14px}
body.dash-compact .smart-grid{gap:8px;margin-bottom:10px}
body.dash-compact .sec-hdr{margin-top:10px;padding:4px 0 6px}
body.dash-compact .mbar-outer{margin-bottom:10px}
body.dash-compact .table-card{margin-bottom:10px}

/* Toggle switch */
.sw-wrap{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0;cursor:pointer}
.sw-wrap input{opacity:0;width:0;height:0;position:absolute}
.sw-slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:11px;transition:background .2s}
.sw-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sw-wrap input:checked+.sw-slider{background:var(--blue)}
.sw-wrap input:checked+.sw-slider::before{transform:translateX(16px)}

/* Pref row */
.ktp-toggle{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd-1)}
.ktp-toggle:last-of-type{border-bottom:none}
.ktp-toggle-label{font-size:13px;font-weight:500;color:var(--i1)}
.ktp-toggle-sub{font-size:11px;color:var(--i4);margin-top:2px}

/* ── Operational alert chips ──────────────────────────── */
.op-alerts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.op-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.op-chip-red   {background:var(--err-bg);  color:var(--rose-l);  border:1px solid var(--err-bd);}
.op-chip-orange{background:var(--warn-bg); color:var(--amber-l); border:1px solid var(--warn-bd);}
.op-chip-gray  {background:rgba(255,255,255,.04);color:var(--i3);border:1px solid var(--bd-1);}
.op-chip-blue  {background:var(--info-bg); color:var(--blue-l);  border:1px solid var(--info-bd);}
/* ── Status filter pills ──────────────────────────────── */
.filter-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fpill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;
       background:rgba(255,255,255,.04);color:var(--i3);border:1px solid var(--bd-1);
       cursor:pointer;transition:all .15s var(--ease-std);}
.fpill:hover{background:rgba(255,255,255,.08);color:var(--i1);}
.fpill-active{background:rgba(59,130,246,.12);color:var(--blue-l);border-color:rgba(59,130,246,.35);}

/* ── Import Wizard ──────────────────────────────── */
#import-wiz-overlay{display:none;position:fixed;inset:0;z-index:9500;
  background:rgba(0,0,0,.72);align-items:center;justify-content:center;}
#import-wiz-overlay.open{display:flex;}
#import-wiz{background:#0a1628;border:1px solid rgba(59,130,246,.2);border-radius:16px;
  width:min(900px,95vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);}
.wiz-hdr{padding:18px 24px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.wiz-steps{display:flex;align-items:center;gap:0;padding:0 24px;
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;overflow-x:auto;}

  border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
.wiz-stp.active{color:var(--blue-l,#60a5fa);border-bottom-color:#3b82f6;}
.wiz-stp.done{color:var(--i3);}
.wiz-stp-arrow{color:var(--i5);font-size:10px;padding:0 2px;}
.wiz-body{flex:1;overflow-y:auto;padding:20px 24px;}
.wiz-ftr{padding:14px 24px;border-top:1px solid rgba(255,255,255,.07);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.wiz-drop{border:2px dashed rgba(59,130,246,.3);border-radius:12px;padding:40px 20px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.wiz-drop:hover,.wiz-drop.drag-over{border-color:rgba(59,130,246,.7);
  background:rgba(59,130,246,.06);}
.wiz-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.wiz-tbl th{background:rgba(255,255,255,.04);color:var(--i3);padding:7px 10px;
  border:1px solid rgba(255,255,255,.07);font-weight:600;text-align:left;}
.wiz-tbl td{padding:6px 10px;border:1px solid rgba(255,255,255,.06);color:var(--i2);

.wiz-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.wiz-sel{background:#07101f;border:1px solid rgba(59,130,246,.25);color:var(--i2);

[data-theme="light"] .wiz-sel{background:rgba(255,255,255,.88);border-color:rgba(30,50,100,.18);}
[data-theme="light"] .wiz-tbl td{border-color:rgba(30,50,100,.09);background:rgba(255,255,255,.5);}
[data-theme="light"] .wiz-tbl tr:nth-child(even) td{background:rgba(230,238,252,.3);}
[data-theme="light"] #import-wiz{background:#e4eaf5;border-color:rgba(30,50,100,.18);}

[data-theme="light"] #import-hist-panel{background:#e4eaf5 !important;border-color:rgba(30,50,100,.18) !important;box-shadow:0 20px 60px rgba(30,50,100,.2) !important;}
[data-theme="light"] .wiz-hdr{border-bottom-color:rgba(30,50,100,.14);}
[data-theme="light"] .wiz-steps{border-bottom-color:rgba(30,50,100,.14);}
[data-theme="light"] .wiz-ftr{border-top-color:rgba(30,50,100,.14);}
[data-theme="light"] .wiz-stp{color:#5a7aa8;}
[data-theme="light"] .wiz-stp.active{color:#1e3a6a;border-bottom-color:#2563eb;}
[data-theme="light"] .wiz-stp.done{color:#3a5a8a;}
[data-theme="light"] .wiz-stp-arrow{color:#8098bc;}
[data-theme="light"] .wiz-drop{border-color:rgba(37,99,235,.3);background:rgba(255,255,255,.6);}
[data-theme="light"] .wiz-drop:hover,[data-theme="light"] .wiz-drop.drag-over{border-color:rgba(37,99,235,.6);background:rgba(37,99,235,.06);}
.val-ok{color:#22c55e;}.val-warn{color:#f59e0b;}.val-err{color:#ef4444;}

/* ═══════════════════════════════════════════════════════════════════
   SYSTEM-LEVEL DESIGN STABILIZATION
   Phase A: Dashboard grid — equal heights, min-heights
   Phase B: Card anatomy — padding normalization
   Phase E: Responsive contract — explicit breakpoints
   Phase F: Interactive affordance — cursor: pointer
   Phase I: Modal system — footer, overlay
   (All rules here are base-level: no !important, no theme wrapper.
    They appear last in source and win by cascade order.)
═══════════════════════════════════════════════════════════════════ */

/* ── COLOR UTILITY CLASSES — light-mode high-contrast overrides ──── */
/* Dark-mode color tokens (--blue-l, --emerald-l, etc.) fail contrast
   on white card backgrounds. Override with accessible dark equivalents. */
[data-theme="light"] .c-blue   { color: #1d4ed8; }   /* #60a5fa → #1d4ed8 (+8.5:1) */
[data-theme="light"] .c-green  { color: #047857; }   /* #34d399 → #047857 (+7.6:1) */
[data-theme="light"] .c-red    { color: #be123c; }   /* #fb7185 → #be123c (+7.0:1) */
[data-theme="light"] .c-orange { color: #92400e; }   /* #fbbf24 → #92400e (+6.3:1) */
[data-theme="light"] .cg       { color: #047857; }
[data-theme="light"] .cr       { color: #be123c; }
[data-theme="light"] .cb       { color: #1d4ed8; }
[data-theme="light"] .co       { color: #92400e; }   /* if .co used as orange alias */

/* ── WIDGET SURFACE — solidify background, normalize elevation ────── */
/* Late CSS set rgba(255,255,255,.88) — make it fully opaque solid */
[data-theme="light"] .widget {
  background: #ffffff;
  border: 1.5px solid rgba(30,50,100,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 0 0 1px rgba(30,50,100,.06),
    0 2px 6px rgba(20,40,100,.10),
    0 8px 22px rgba(20,40,100,.08);
}

/* ── WIDGET TEXT — ensure readability on solid white ─────────────── */
[data-theme="light"] .widget-title { color: #5a7aa8; font-weight: 700; letter-spacing: .04em; }
[data-theme="light"] .widget-value { color: #080f1e; font-weight: 700; }
[data-theme="light"] .widget-sub   { color: #5a7aa8; }
[data-theme="light"] .widget-trend { color: #1e3a6a; }

/* ── RANK BAR TRACK — visible trough on white widget surface ─────── */
[data-theme="light"] .rank-bar-wrap { background: rgba(30,50,100,.12); }

/* ── KPI CARD ACCENT STRIPE — use a proper light-mode blue ───────── */
/* The ::before uses var(--kpi-color) which may be pale neon on white */
[data-theme="light"] .kpi-card::before { opacity: .45; }

/* ── LOW-CONTRAST SECONDARY TEXT — final calibration ─────────────── */
[data-theme="light"] .kpi-label  { color: #5a7aa8; }
[data-theme="light"] .rank-label { color: #3a5a8a; }
[data-theme="light"] .sec-hdr    { color: #3a5a8a; }
[data-theme="light"] .sec-hdr::after { background: rgba(30,50,100,.16); }

/* ── TABLE BODY ROW SEPARATOR — subtle between rows ─────────────── */
[data-theme="light"] tbody tr {
  border-bottom-color: rgba(30,50,100,.06);
}

/* ── TABLE CELL TEXT — primary cell text readable ───────────────── */
[data-theme="light"] tbody td { color: #1e3a6a; }
[data-theme="light"] tbody td:first-child { color: #080f1e; }

/* ── ANALYTICS TABS — active state ──────────────────────────────── */
[data-theme="light"] .a-tab.active,
[data-theme="light"] .a-tab[data-active="true"] {
  background: #ffffff;
  color: #1e40af;
  box-shadow: 0 1px 4px rgba(20,40,100,.12), 0 0 0 1px rgba(30,50,100,.12);
}
[data-theme="light"] .a-tab { color: #5a7aa8; }
[data-theme="light"] .a-tab:hover { color: #1e3a6a; background: rgba(37,99,235,.06); }

/* ── GAUGE VALUE TEXT ────────────────────────────────────────────── */
[data-theme="light"] .gauge-val { color: #080f1e; }

/* ── A: Grid equal-height rows — prevents ragged card heights ────── */
.kpi-grid  { align-items: stretch; }
.smart-grid { align-items: stretch; }

/* ── A: Card minimum heights — prevents content-driven collapse ──── */
.kpi-card { min-height: 108px; }
.widget   { min-height: 132px; }

/* ── B: Widget internal padding — match kpi-card (16px 15px) ──────── */
.widget { padding: 16px 15px; }

/* ── E: Explicit responsive breakpoints ──────────────────────────── */

/* 1600+ — wide monitor: widen grid cells, more breathing room */
@media (min-width: 1600px) {
  .kpi-grid   { grid-template-columns: repeat(auto-fill, minmax(168px,1fr)); gap: 14px; }
  .smart-grid { grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; }
  #content    { padding: 24px; }
}

/* 1440 — standard laptop: tighten smart-grid slightly */
@media (max-width: 1440px) {
  .smart-grid { grid-template-columns: repeat(auto-fill, minmax(204px,1fr)); }
}

/* 1280 — small laptop: explicit kpi-grid adjustment */
@media (max-width: 1280px) {
  .kpi-grid { grid-template-columns: repeat(auto-fill, minmax(135px,1fr)); }
  .smart-grid { grid-template-columns: repeat(auto-fill, minmax(188px,1fr)); }
}

/* 1024 — tablet landscape / snap: stack analytics charts, shrink grids */
@media (max-width: 1024px) {
  :root { --sb-w: 220px; }
  #content { padding: 15px; }
  .kpi-grid { grid-template-columns: repeat(auto-fill, minmax(128px,1fr)); gap: 10px; }
  .smart-grid { grid-template-columns: repeat(auto-fill, minmax(172px,1fr)); gap: 10px; }
  .analytics-chart-row { grid-template-columns: 1fr; }
  .mgmt-stats { grid-template-columns: repeat(auto-fill, minmax(118px,1fr)); }
}

/* 768 — tablet portrait: two-column forms, stack charts */
@media (max-width: 768px) {
  #content { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(auto-fill, minmax(115px,1fr)); gap: 9px; }
  .smart-grid { grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 9px; }
  .form-grid-2 { grid-template-columns: 1fr; }
  .form-grid-3 { grid-template-columns: 1fr 1fr; }
  .info-grid   { grid-template-columns: 1fr; }
  .table-card  { margin-bottom: 12px; }
  .analytics-chart-row { grid-template-columns: 1fr; }
}

/* ── F: Interactive affordances — cursor: pointer ─────────────────── */
/* Elements that receive onclick but lack cursor:pointer in base CSS */
.op-chip,
.kpi-card[onclick],
.widget[onclick],
.rank-item[onclick],
tbody tr[onclick] { cursor: pointer; }

/* ── I: Modal footer — wrap on narrow viewports ─────────────────── */
.modal-footer { flex-wrap: wrap; }

<script>
/* ── KTP Safe-Boot & Recovery ── runs before ALL app JS ── */
(function(){
  // ── Global error overlay (works even if main script crashes mid-way) ──
  function _showErr(msg,stage){
    var el=document.getElementById('ktp-err-overlay');
    if(!el){
      el=document.createElement('div');el.id='ktp-err-overlay';
      el.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(6,13,26,.96);font-family:system-ui,sans-serif;padding:20px';
      if(document.body){document.body.appendChild(el);}
      else{document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(el);});}
    }
    var _st=function(k,fb){try{return(typeof window.t==='function')?window.t(k):fb;}catch(e){return fb;}};
    el.innerHTML='<div style="max-width:460px;width:100%;background:#0d1a2e;border:1px solid rgba(244,63,94,.5);border-radius:14px;padding:26px 24px 20px">'
      +'<div style="font-size:15px;font-weight:700;color:#fb7185;margin-bottom:8px">⚠️ '+_st('crashTitle','App Failed to Start')+'</div>'
      +'<div style="font-size:11.5px;color:#94a3b8;margin-bottom:6px">'+_st('crashStageLabel','Stage')+': <b style="color:#e2e8f0">'+(stage||'unknown')+'</b></div>'
      +'<pre style="font-size:10.5px;color:#fca5a5;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow:auto;background:rgba(0,0,0,.3);border-radius:6px;padding:8px;margin-bottom:14px">'+String(msg||'').replace(/[<>&]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[c]||c;})+'</pre>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
        +'<button onclick="window.__ktpRecover(true)" style="padding:8px 14px;background:#7f1d1d;border:1px solid rgba(244,63,94,.5);border-radius:8px;color:#fca5a5;cursor:pointer;font-size:12px">🗑 '+_st('crashResetBtn','Reset & Backup Data')+'</button>'
        +'<button onclick="window.__ktpSafeReload()" style="padding:8px 14px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);border-radius:8px;color:#93c5fd;cursor:pointer;font-size:12px">🛡 '+_st('crashReturnBtn','Return to Setup')+'</button>'
      +'</div>'
      +'</div>';
  }
  window.onerror=function(msg,src,line,col,err){
    var stage=(window.__BOOT_STAGE__&&window.__BOOT_STAGE__.stage)||'unknown';
    _showErr((err&&(err.stack||err.message))||msg,stage);
    return false; // don't suppress — let Electron also log it
  };
  window.onunhandledrejection=function(ev){
    var stage=(window.__BOOT_STAGE__&&window.__BOOT_STAGE__.stage)||'unknown';
    _showErr(ev.reason?(ev.reason.stack||ev.reason.message||String(ev.reason)):'Unhandled rejection',stage);
  };

  // ── Recovery: back up data then wipe + reload ──────────────
  window.__ktpRecover=function(backup){
    try{
      if(backup){
        var raw=localStorage.getItem('ktp_v5');
        if(raw) try{localStorage.setItem('ktp_v5_emrg_'+Date.now(),raw.slice(0,500000));}catch(e){}
      }
      localStorage.removeItem('ktp_v5');
      localStorage.removeItem('ktp_safe_mode');
    }catch(e){}
    location.reload();
  };

  // ── Safe reload: set flag + reload — skips loadLocal next boot
  window.__ktpSafeReload=function(){
    try{localStorage.setItem('ktp_safe_mode','1');}catch(e){}
    location.reload();
  };

  // ── Safe mode: consume flag immediately so it doesn't persist ─
  var _safe=false;
  try{

      _safe=true;
      localStorage.removeItem('ktp_safe_mode');
    }
  }catch(e){}
  window.__KTP_SAFE_MODE__=_safe;

  document.addEventListener('keydown',function(e){

      e.preventDefault();
      var _rc=function(k,fb){try{return(typeof window.t==='function')?window.t(k):fb;}catch(e){return fb;}};
      if(confirm(_rc('crashRecoverConfirm','Recovery: local data will be backed up and deleted, then the app will restart. Continue?'))){
        window.__ktpRecover(true);
      }
    }
  },true);
})();
</script>

const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_EN_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Convert internal TR month key ("Nisan 2026") to display label in current language
function monthLabel(mKey){
  if(!mKey) return mKey;
  var parts=mKey.split(' ');
  if(parts.length!==2) return mKey;
  var trName=parts[0],year=parts[1];
  var idx=MONTHS.indexOf(trName);
  if(idx<0) return mKey;
  var lang=(DATA&&DATA.settings&&DATA.settings.lang)||'tr';
  return lang==='en'?(MONTHS_EN[idx]+' '+year):mKey;
}
// Short 3-letter label for month bar buttons
function monthLabelShort(trName){
  var idx=MONTHS.indexOf(trName);
  if(idx<0) return trName.slice(0,3);
  var lang=(DATA&&DATA.settings&&DATA.settings.lang)||'tr';
  return lang==='en'?MONTHS_EN_SHORT[idx]:trName.slice(0,3);

// ── Dynamic month range: 5 years back · 10 years forward · all DATA months ──
function buildAllMonths(extra){
  const now=new Date();
  const sy=now.getFullYear()-5, ey=now.getFullYear()+10;
  const set=new Set();
  for(let y=sy;y<=ey;y++) MONTHS.forEach(m=>set.add(m+' '+y));
  // Scan DATA for months outside the base range (import/restore compatibility)
  try{
    if(typeof DATA!=='undefined'&&DATA){
      const scan=o=>{if(o&&typeof o==='object')Object.keys(o).forEach(k=>{
        if(/^[A-Za-zÀ-ɏ]+ \d{4}$/.test(k)) set.add(k);
        else if(k&&typeof o[k]==='object') scan(o[k]);
      });};
      scan(DATA.payments);scan(DATA.expenses);
      scan(DATA.mgmt);scan(DATA.tanNet);scan(DATA.gayNet);
    }
  }catch(e){}
  if(extra) extra.forEach(m=>{if(m&&typeof m==='string') set.add(m);});
  try{ if(typeof S!=='undefined'&&S&&S.month) set.add(S.month); }catch(e){}
  const midx=m=>{const p=m.split(' ');return parseInt(p[1]||0)*12+MONTHS.indexOf(p[0]);};
  return [...set].sort((a,b)=>midx(a)-midx(b));
}

    if(p.tanNet)   DATA.tanNet   = p.tanNet;
    if(p.gayNet)   DATA.gayNet   = p.gayNet;
    if(p.history)         DATA.history         = p.history;
    if(p.importHistory)   DATA.importHistory   = p.importHistory;
    if(p.importSnapshots) DATA.importSnapshots = p.importSnapshots;
    if(p.cloud)    DATA.cloud    = p.cloud;
    if(p.settings) DATA.settings = p.settings;
    if(p.waLog)    DATA.waLog    = p.waLog;
    if(p.users)    DATA.users    = p.users;
    if(p.initialized!==undefined) DATA.initialized = p.initialized;
    // Phase 3: restore buildings or migrate from legacy tenant keys
    if(p.buildings){
      DATA.buildings = p.buildings;
    } else {
      DATA.buildings = Object.keys(DATA.tenants).map((k,i)=>({
        id:    k,
        name:  BL[k]||k,
        short: BS[k]||k.replace(/[^A-Z]/g,'').slice(0,3)||String.fromCharCode(65+i),
        color: '',
        active:true,
        order: i,
        metadata:{}
      }));
    }
  }catch(e){
    console.error('loadLocal',e);
    try{localStorage.setItem('ktp_v5_corrupt_backup',raw);}catch{}
    window._ktpCorruptWarn='⚠️ Kayıtlı veri bozuk — ktp_v5_corrupt_backup anahtarına kopyalandı. Uygulama boş veriyle başlatıldı.';
  }
}

// CLOUD SYNC
// ═══════════════════════════════════════════════
async function cloudSync(dir='push'){
  const url = DATA.cloud.url;
  const token = DATA.cloud.token || DATA.cloud.key; // support both auth methods
  if(!url){ toast('⚠️ Bulut URL eksik','red'); return; }
  S.syncing=true; updateCloudUI();

  try{
    // ── v2: token-based auth (new server) ──────────────────
    const headers = {
      'Content-Type':'application/json',
      'Authorization': token ? 'Bearer '+token : ''
    };

    if(dir==='push'){
      const payload = {
        tenants:DATA.tenants, payments:DATA.payments,
        expenses:DATA.expenses, mgmt:DATA.mgmt,
        history:DATA.history, waLog:DATA.waLog,
        users:DATA.users, settings:DATA.settings
      };
      const body = JSON.stringify({
        payload,
        clientVersion: DATA.cloud.serverVersion || 0
      });
      const r = await fetchWithRetry(url+'/sync', {
        method:'POST', headers, body
      });
      if(r.status===409){
        // Conflict — pull first, then user can retry
        const conflictData = await r.json();
        toast(t('cloudConflict'),'red');
        addHist('Bulut çakışma: sunucu v'+conflictData.serverVersion+', istemci v'+conflictData.clientVersion);
        S.syncing=false; updateCloudUI(); return;
      }
      if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text().catch(()=>'')));
      const res = await r.json();
      DATA.cloud.serverVersion = res.version;
      DATA.cloud.lastSync = new Date().toISOString();
      DATA.cloud.enabled = true;
      saveLocal();
      toast('☁️ Push tamam (v'+res.version+')','blue');
      addHist('Bulut push: v'+res.version+' ('+Math.round(res.bytes/1024)+'KB)');

    } else { // pull
      const r = await fetchWithRetry(url+'/sync', { headers });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const remote = await r.json();
      if(!remote.payload) { toast('☁️ Sunucuda veri yok','orange'); S.syncing=false; updateCloudUI(); return; }
      const d = remote.payload;
      window._lastPullSnapshot = JSON.stringify(DATA);
      if(d.tenants)  DATA.tenants  = d.tenants;
      if(d.payments) DATA.payments = d.payments;
      if(d.expenses) DATA.expenses = d.expenses;
      if(d.alper !== undefined && d.mgmt === undefined) d.mgmt = d.alper; // compat: renamed alper→mgmt in v6.1
      if(d.mgmt)     DATA.mgmt     = d.mgmt;
      if(d.history)  DATA.history  = d.history;
      if(d.waLog)    DATA.waLog    = d.waLog;
      // Don't overwrite local users from server — use server /users endpoint
      DATA.cloud.serverVersion = remote.version;
      DATA.cloud.lastSync = new Date().toISOString();
      DATA.cloud.enabled = true;
      autoRecalc(); ALL_MONTHS=buildAllMonths(); saveLocal(); render(); updateBadges();
      toast(t('cloudPullOk'),'blue');
      addHist('Bulut pull: v'+remote.version+' ('+(remote.updatedBy||'?')+')');
    }

  }catch(e){
    const msg = e.message || 'Bilinmeyen hata';
    toast(t('cloudError')+msg,'red');
    addHist('Bulut hatası ('+dir+'): '+msg);
    // Don't lose local data on server failure
  }finally{
    S.syncing=false;
    updateCloudUI();
  }
}

// ── Fetch with retry (1 retry on network error) ──────────────
async function fetchWithRetry(url, opts, retries=1){
  try{ return await fetch(url, opts); }
  catch(e){
    if(retries<=0) throw e;
    await new Promise(r=>setTimeout(r,1500));
    return fetchWithRetry(url, opts, retries-1);
  }
}

// ── Login to server ───────────────────────────────────────────
async function cloudLogin(url, username, password){
  try{
    const r = await fetch(url+'/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if(!r.ok) return {ok:false, error: data.error||'Login failed'};
    return {ok:true, token: data.token, user: data.user};
  }catch(e){ return {ok:false, error: e.message}; }
}

// ── Check server health ───────────────────────────────────────
async function checkServerHealth(url){
  try{
    const r = await fetch(url+'/health', {signal: AbortSignal.timeout(5000)});
    if(!r.ok) return {ok:false, error:'HTTP '+r.status};
    return {ok:true, ...(await r.json())};
  }catch(e){ return {ok:false, error: e.message}; }
}


function updateCloudUI(){
  const dot=document.getElementById('cloud-dot');
  const lbl=document.getElementById('cloud-title');
  const sub=document.getElementById('cloud-sub');
  if(!dot) return;
  const lang=(DATA&&DATA.settings&&DATA.settings.lang)||'tr';
  if(S.syncing){
    dot.className='cloud-dot sync';lbl.textContent=t('cloudSyncing');if(sub) sub.textContent=t('cloudWait');
  } else if(DATA.cloud.enabled&&DATA.cloud.url){
    dot.className='cdot ok';lbl.textContent=t('syncConnected');
    const d=DATA.cloud.lastSync?new Date(DATA.cloud.lastSync).toLocaleTimeString(lang==='en'?'en-US':'tr-TR',{hour:'2-digit',minute:'2-digit'}):'';
    sub.textContent=d?t('syncLast')+' '+d:t('cloudActiveShort');
  } else {
    dot.className='cdot off';lbl.textContent=t('cloudNone');sub.textContent=t('cloudLocal');
  }
}

// ── Security helpers ─────────────────────────────────────────────────────────
async function _hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(String(pin)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function _esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// B3: PBKDF2 PIN hashing — stronger than bare SHA-256; per-user salt prevents precomputation
async function _hashPinV2(pin,salt){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(String(pin)),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(String(salt)),iterations:100000,hash:'SHA-256'},key,256);
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function _genSalt(){
  return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// B1: Rate-limiting helpers
function _getPinAttempts(uid){if(!_pinAttempts[uid])_pinAttempts[uid]={count:0,lockUntil:0};return _pinAttempts[uid];}
function _isLockedOut(uid){const s=_getPinAttempts(uid);return s.lockUntil>0&&Date.now()<s.lockUntil;}
function _resetAttempts(uid){const s=_getPinAttempts(uid);s.count=0;s.lockUntil=0;}
function _recordFailedAttempt(uid){const s=_getPinAttempts(uid);s.count++;if(s.count>=PIN_MAX_ATTEMPTS)s.lockUntil=Date.now()+PIN_LOCKOUT_MS;}
function _showLockout(uid){
  if(_lockoutTimer){clearInterval(_lockoutTimer);_lockoutTimer=null;}
  const el=document.getElementById('login-err');
  if(!el) return;
  function tick(){
    const s=_pinAttempts[uid];
    if(!s||!s.lockUntil||Date.now()>=s.lockUntil){
      el.textContent='';
      clearInterval(_lockoutTimer);_lockoutTimer=null;
      _resetAttempts(uid);
      return;
    }
    el.textContent=t('pinLocked').replace('{n}',Math.ceil((s.lockUntil-Date.now())/1000));
  }
  tick();
  _lockoutTimer=setInterval(tick,1000);
}

// CH-1: Inactivity auto-logout helpers
function _resetIdleTimer(){
  if(!currentUser) return;
  if(_idleTimer) clearTimeout(_idleTimer);
  _idleTimer=setTimeout(_idleLogout,IDLE_TIMEOUT_MS);
}

}
// ─────────────────────────────────────────────────────────────────────────────

async function checkPin(){
  const inp=document.getElementById('pin-inp');
  if(!inp) return;
  const val=inp.value;
  if(val.length<4) return;
  if(!loginSelectedUser){
    console.warn('[BOOT] checkPin called with null loginSelectedUser — re-rendering login');
    renderLogin();
    return;
  }

  // B1: Reject immediately if account is locked; show countdown and abort
  const uid=loginSelectedUser.id;
  if(_isLockedOut(uid)){
    _showLockout(uid);
    inp.value='';
    return;
  }

  // B3: Verify using whichever credential is stored, newest first
  let verified=false, needsUpgrade=false;
  if(loginSelectedUser.pin_hash_v2&&loginSelectedUser.pin_salt){
    // PBKDF2 (current standard)
    verified=(await _hashPinV2(val,loginSelectedUser.pin_salt))===loginSelectedUser.pin_hash_v2;
  } else if(loginSelectedUser.pin_hash){
    // SHA-256 (legacy) — upgrade to PBKDF2 on success
    verified=(await _hashPin(val))===loginSelectedUser.pin_hash;
    if(verified) needsUpgrade=true;
  } else if(loginSelectedUser.pin!==undefined){
    // Plaintext (very legacy) — upgrade to PBKDF2 on success
    verified=(val===loginSelectedUser.pin);
    if(verified) needsUpgrade=true;
  }

  if(verified){
    // B3: Transparently upgrade legacy credential to PBKDF2
    if(needsUpgrade){
      const salt=_genSalt();
      loginSelectedUser.pin_hash_v2=await _hashPinV2(val,salt);
      loginSelectedUser.pin_salt=salt;
      delete loginSelectedUser.pin_hash;
      delete loginSelectedUser.pin;
      saveLocal();
    }
    // B1: Successful login clears any accumulated failures
    _resetAttempts(uid);
    if(_lockoutTimer){clearInterval(_lockoutTimer);_lockoutTimer=null;}
    currentUser=loginSelectedUser;
    __boot('login','user: '+loginSelectedUser.id);
    document.getElementById('login-screen').style.display='none';
    initApp();
  } else {
    // B1: Record failure; show lockout or remaining-attempts hint
    _recordFailedAttempt(uid);
    if(_isLockedOut(uid)){
      _showLockout(uid);
    } else {
      const remaining=PIN_MAX_ATTEMPTS-_getPinAttempts(uid).count;
      const el=document.getElementById('login-err');
      el.textContent=t('pinError')+(remaining>0?'  '+t('pinAttemptsLeft').replace('{n}',remaining):'');
      setTimeout(()=>{if(el.textContent&&!el.textContent.startsWith('🔒'))el.textContent='';},2000);
    }
    inp.value='';
  }
}

  if(_idleTimer){clearTimeout(_idleTimer);_idleTimer=null;}

  document.getElementById('login-screen').style.display='flex';

function currencySymbol(){var cur=(DATA&&DATA.settings&&DATA.settings.currency)||'TRY';return cur==='USD'?'$':'₺';}

const TL=money; // backward compat alias
// Format ISO date string for current locale: TR → DD.MM.YYYY, EN → MM/DD/YYYY
function formatDate(d){
  if(!d) return '—';
  var lang=(DATA&&DATA.settings&&DATA.settings.lang)||'tr';
  try{
    var dt=new Date(d);
    if(isNaN(dt.getTime())) return d;
    var dd=String(dt.getUTCDate()).padStart(2,'0');
    var mm=String(dt.getUTCMonth()+1).padStart(2,'0');
    var yy=dt.getUTCFullYear();
    return lang==='en'?(mm+'/'+dd+'/'+yy):(dd+'.'+mm+'.'+yy);
  }catch(e){return d;}
}
const sortU=a=>[...a].sort((a,b)=>(parseInt(a.unit.replace(/\D/g,''))||999)-(parseInt(b.unit.replace(/\D/g,''))||999));

function getP(tid,mo){return ((DATA.payments||{})[tid]||{})[mo]||{paid:0,date:'',sekil:'',notes:''};}
function setP(tid,mo,d){if(!DATA.payments[tid])DATA.payments[tid]={};DATA.payments[tid][mo]=d;}

function getStatus(ten,mo){
  if(!ten.active||ten.rent===0) return {lbl:t('statusVacant'),cls:'b-gray'};
  const p=getP(ten.id,mo);
  if(p.paid>=ten.rent) return {lbl:t('statusPaid'),cls:'b-green'};
  if(p.paid>0) return {lbl:t('statusPartial'),cls:'b-orange'};
  return {lbl:t('statusUnpaid'),cls:'b-red'};
}

function safeArr(v){return Array.isArray(v)?v:[];}
function safeTens(bld){return safeArr(DATA.tenants[bld]);}
function safeExps(bld,mo){return safeArr(((DATA.expenses[bld]||{})[mo]));}
function expTotal(bld,mo){return safeExps(bld,mo).reduce((s,e)=>s+(e&&+e.tutar||0),0);}
function paidTotal(bld,mo){return safeTens(bld).filter(t=>t.active&&t.rent>0).reduce((s,t)=>s+getP(t.id,mo).paid,0);}
function rentTotal(bld){return safeTens(bld).filter(t=>t.active&&t.rent>0).reduce((s,t)=>s+t.rent,0);}

function isDue(t,mo){
  if(!t.active||t.rent===0) return false;
  if(getP(t.id,mo).paid>=t.rent) return false;
  const now=new Date();
  const [mName,yr]=mo.split(' ');
  const mi=MONTHS.indexOf(mName);
  if(mi<0) return false;
  const dueDate=new Date(parseInt(yr),mi,t.gun||1);
  const overdue=new Date(parseInt(yr),mi,(t.gun||1)+1);
  return now>=overdue;
}

async function _obCloudConnect(){
  const url=(document.getElementById('ob-supa-url')?.value||'').trim().replace(/\/+$/,'');
  const key=(document.getElementById('ob-supa-key')?.value||'').trim();
  const err=document.getElementById('ob-err2');
  if(!url||!key){ if(err) err.textContent=t('obErrUrlKey'); return; }
  if(!/^https:\/\/.+\.supabase\.co$/.test(url)){ if(err) err.textContent=t('obErrUrlFmt'); return; }
  // Store temporarily so _supaSelect can use them; cleared on connection error
  DATA.cloud.supabaseUrl=url;
  DATA.cloud.supabaseKey=key;
  DATA.cloud.mode='supabase';
  if(err) err.textContent=t('obConnecting');
  await _obCloudFetch();
}

async function _obCloudFetch(){
  const err=document.getElementById('ob-err2');
  const wsId=DATA.cloud.workspaceId||'ktp_main';
  try{
    const rows=await _supaSelect('ktp_sync','id=eq.'+encodeURIComponent(wsId));
    if(!rows||!rows.length){
      if(err) err.textContent=t('obErrNoData');
      return;
    }
    const d=JSON.parse(rows[0].data_json);
    const validated=_importValidate(d);
    if(!validated.ok){
      if(err) err.textContent=t('obErrInvalid')+validated.errors.join(', ');
      return;
    }
    const result=_importCommit(d,'overwrite');
    if(!result.ok){
      if(err) err.textContent=t('obErrLoad')+(result.error||t('unknownOp'));
      return;
    }
    // Persist cloud metadata — sync disabled until user explicitly enables it
    DATA.cloud.serverVersion=rows[0].version;
    DATA.cloud.lastSync=rows[0].updated_at;
    DATA.cloud.workspaceId=wsId;
    DATA.cloud.enabled=false;
    _obPin=''; _obName='';
    saveLocal();
    const obScr=document.getElementById('ob-screen');
    if(obScr) obScr.style.display='none';
    renderLogin();
    toast(t('obSuccessLoaded'),'green');
  }catch(e){
    if(err) err.textContent=t('obErrConn')+e.message;
    // Credentials remain set if connection reached Supabase — user can retry
  }
}

async function obCommit(){
  const bldName=(document.getElementById('ob-bld')?.value||'').trim();
  const err=document.getElementById('ob-err2');
  if(!_obPin||_obPin.length<4){ if(err) err.textContent=t('obErrPinInvalid'); return; }
  if(bldName.length<2){ if(err) err.textContent=t('obErrBldName'); return; }

  const adminName=(_obName||'').trim()||t('defaultAdminName');
  const adminAvatar=adminName.replace(/\s+/g,' ').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'Y';

  const bldId=bldName.toUpperCase().trim();
  const bldShort=bldName.split(/\s+/).map(w=>w.replace(/[^a-zA-ZğüşöçıĞÜŞÖÇİ]/gi,'')[0]||'')
    .join('').toUpperCase().slice(0,3) || bldName.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(0,3) || 'BLD';

  const adminPinHash=await _hashPin(_obPin);

  // Single mutation point — all DATA writes happen here
  DATA.initialized=true;
  DATA.buildings=[{id:bldId,name:bldName,short:bldShort,color:'',active:true,order:0,metadata:{}}];
  DATA.tenants[bldId]=[];
  DATA.payments[bldId]={};
  DATA.expenses[bldId]=[];
  DATA.users=[{id:'admin',name:adminName,role:'admin',pin_hash:adminPinHash,color:'#4a8af4',avatar:adminAvatar}];
  _obPin=''; _obName=''; // clear transients immediately

  syncBuildingConstants();
  renderBuildingNav();
  saveLocal();

  document.getElementById('ob-screen').style.display='none';
  renderLogin();
}

// ── Month bar: drag-to-scroll with momentum/inertia ──────────
const _mbar={
  dragging:false,startX:0,scrollLeft:0,el:null,
  velX:0,lastX:0,lastT:0,rafId:null
};

function mbarDragStart(e,el){
  // Cancel any ongoing momentum
  if(_mbar.rafId){cancelAnimationFrame(_mbar.rafId);_mbar.rafId=null;}
  _mbar.dragging=true;_mbar.el=el;
  _mbar.startX=e.pageX-el.offsetLeft;
  _mbar.scrollLeft=el.scrollLeft;
  _mbar.velX=0;_mbar.lastX=e.pageX;_mbar.lastT=Date.now();
  el.classList.add('is-dragging');
  e.preventDefault();
}
function mbarDragMove(e,el){
  if(!_mbar.dragging||_mbar.el!==el) return;
  e.preventDefault();
  const now=Date.now();
  const dt=Math.max(now-_mbar.lastT,1);
  const dx=e.pageX-_mbar.lastX;
  // Exponential moving average velocity (px/ms)
  _mbar.velX=_mbar.velX*0.7+dx/dt*0.3;
  _mbar.lastX=e.pageX;_mbar.lastT=now;
  const x=e.pageX-el.offsetLeft;
  el.scrollLeft=_mbar.scrollLeft-(x-_mbar.startX);
}
function mbarDragEnd(el){
  if(!_mbar.dragging) return;
  _mbar.dragging=false;
  if(el) el.classList.remove('is-dragging');
  // Apply momentum (inertia scroll)
  const vel=_mbar.velX*18; // scale velocity
  if(Math.abs(vel)<0.5) return;
  let v=vel;
  function momentum(){
    if(Math.abs(v)<0.2){_mbar.rafId=null;return;}
    el.scrollLeft-=v;
    v*=0.88; // friction
    _mbar.rafId=requestAnimationFrame(momentum);
  }
  _mbar.rafId=requestAnimationFrame(momentum);
}
function mbarWheel(e,el){
  e.preventDefault();
  // Cancel momentum on wheel
  if(_mbar.rafId){cancelAnimationFrame(_mbar.rafId);_mbar.rafId=null;}
  const delta=(e.deltaY||e.deltaX);
  // Smooth step
  el.scrollBy({left:delta*1.2,behavior:'auto'});
}
function mbarScroll(id,delta){
  const el=document.getElementById(id);
  if(el) el.scrollBy({left:delta,behavior:'smooth'});
}

function stepMo(dir){
  const idx=ALL_MONTHS.indexOf(S.month);
  const nidx=idx+dir;
  if(nidx<0){
    // Extend backward by 1 year
    const fy=parseInt(ALL_MONTHS[0].split(' ')[1])-1;
    ALL_MONTHS.unshift(...MONTHS.map(m=>m+' '+fy));
    setMo(ALL_MONTHS[ALL_MONTHS.indexOf(S.month)+dir]);
  } else if(nidx>=ALL_MONTHS.length){
    // Extend forward by 1 year
    const ly=parseInt(ALL_MONTHS[ALL_MONTHS.length-1].split(' ')[1])+1;
    MONTHS.forEach(m=>ALL_MONTHS.push(m+' '+ly));
    setMo(ALL_MONTHS[nidx]);
  } else {
    setMo(ALL_MONTHS[nidx]);
  }
}

// Keyboard arrow support on month bar (focused mbtn)
document.addEventListener('keydown',e=>{
  const onMbar=document.activeElement&&document.activeElement.classList.contains('mbtn');
  if(!onMbar) return;
  const idx=ALL_MONTHS.indexOf(S.month);
  if(e.key==='ArrowRight'&&idx<ALL_MONTHS.length-1){e.preventDefault();setMo(ALL_MONTHS[idx+1]);}
  if(e.key==='ArrowLeft'&&idx>0){e.preventDefault();setMo(ALL_MONTHS[idx-1]);}
});

// Global [ / ] month stepping — works anywhere except when typing or modal is open
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if(document.getElementById('modal-overlay')?.classList.contains('open')) return;
  if(e.key==='['){e.preventDefault();stepMo(-1);}
  if(e.key===']'){e.preventDefault();stepMo(1);}
});

// RENDER DISPATCHER
// ═══════════════════════════════════════════════
function render(){
  const c=document.getElementById('content');
  if(!c) return;
  c.className='fade';void c.offsetWidth;
  const pages={dash:renderDash,pay:renderPay,exp:renderExp,
    mgmt:renderMgmt,charts:renderCharts,wa:renderWA,
    rep:renderRep,hist:renderHist,viz:renderViz,bld:()=>renderBld(S.bld)};
  c.innerHTML=(pages[S.page]||renderDash)();
  if(S.page==='charts') initCharts();
  if(S.page==='viz') initViz();
  if(DATA.settings.autoSave) saveLocal();
}

// DASHBOARD
// ═══════════════════════════════════════════════
function renderDash(){
  const m=S.month;
  let tRent=0,tPaid=0,tExp=0;

  const brows=BK.map(b=>{
    const ts=(DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0);
    const rent=ts.reduce((s,t)=>s+t.rent,0);
    const paid=paidTotal(b,m);
    const ex=expTotal(b,m);
    const net=paid-ex;
    const unpaid=ts.filter(t=>getP(t.id,m).paid<t.rent).length;
    tRent+=rent;tPaid+=paid;tExp+=ex;
    const pct=rent>0?Math.min(100,Math.round(paid/rent*100)):0;
    return `<tr class="cp" onclick="goto('bld','${b}')">
      <td><b>${BL[b]}</b></td>
      <td class="c-muted">${ts.length}</td>
      <td class="cb fw7">${TL(rent)}</td>
      <td>
        <div class="${paid>=rent?'c-green':'c-orange'} fw7">${TL(paid)}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${paid>=rent?'var(--emerald)':'var(--amber)'}"></div></div>
      </td>
      <td class="${unpaid?'c-red':'c-green'}">${unpaid?'⚠️ '+unpaid:' ✅'}</td>
      <td class="c-orange">${TL(ex)}</td>
      <td class="${net>=0?'c-green':'c-red'} fw7">${TL(net)}</td>
      <td><span class="badge b-blue">${t('btnView')}</span></td>
    </tr>`;
  }).join('');

  const net=tPaid-tExp;
  const now=new Date();

  // Contract alerts (60 days)
  let alerts='';
  BK.forEach(b=>(DATA.tenants[b]||[]).filter(ten=>ten.active&&ten.bit).forEach(ten=>{
    const bit=new Date(ten.bit);
    const days=Math.ceil((bit-now)/864e5);
    if(days>=0&&days<=60)
      alerts+=`<tr><td><b>${_esc(BL[b])}</b></td><td>${_esc(ten.unit)}</td><td>${_esc(ten.name)}</td>
        <td>${formatDate(ten.bit)}</td>
        <td class="${days<=30?'c-red':'c-orange'} fw7">${days} ${t('daysLabel')}</td>
        <td class="c-blue">${TL(ten.rent)}</td></tr>`;
  }));

  // Overdue
  let overdue='';
  BK.forEach(b=>(DATA.tenants[b]||[]).filter(ten=>isDue(ten,m)).forEach(ten=>{
    overdue+=`<tr><td><b>${_esc(BL[b])}</b></td><td>${_esc(ten.unit)}</td>
      <td><span class="blink">🔴</span> <b>${_esc(ten.name)}</b></td>
      <td class="c-orange">${t('dayOfMonth')} ${ten.gun}.</td>
      <td class="cr fw7">${TL(ten.rent)}</td>
      <td>${canEdit()?`<button class="btn btn-xs bsu-" onclick="openMod('pay-add','${b}:${ten.id}')">${t('btnEnter')}</button>`:''}
          <button class="btn btn-xs bg-" onclick="waMsg('${b}','${ten.id}','${m}')">💬 WA</button></td></tr>`;
  }));

  return monthBar()+`
  <div class="kpi-grid">
    <div class="kpi-card" style="--kpi-color:var(--blue-l)"><div class="kpi-icon">💰</div><div class="kpi-value">${TL(tRent)}</div><div class="kpi-label">${t('kpiTotalRent')} — ${monthLabel(m)}</div></div>
    <div class="kpi-card" style="--kpi-color:var(--emerald)"><div class="kpi-icon">✅</div><div class="kpi-value">${TL(tPaid)}</div><div class="kpi-label">${t('kpiCollected')}</div><div class="card-sub cg">${tRent>0?Math.round(tPaid/tRent*100):0}%</div></div>
    <div class="kpi-card" style="--kpi-color:var(--rose)"><div class="kpi-icon">❌</div><div class="kpi-value">${TL(tRent-tPaid)}</div><div class="kpi-label">${t('kpiUncollected')}</div></div>
    <div class="kpi-card" style="--kpi-color:var(--amber)"><div class="kpi-icon">💸</div><div class="kpi-value">${TL(tExp)}</div><div class="kpi-label">${t('kpiTotalExp')}</div></div>
    <div class="kpi-card" style="--kpi-color:${net>=0?'var(--emerald)':'var(--rose)'}"><div class="kpi-icon">📈</div><div class="kpi-value">${TL(net)}</div><div class="kpi-label">${t('kpiNetIncome')}</div></div>
  </div>

  <div class="sec-hdr">${t('dashBldSummary')} — ${monthLabel(m)}</div>
  <div class="table-card"><div class="table-scroller"><table>
    <thead><tr><th>${t('colBuilding')}</th><th>${t('colTenant')}</th><th>${t('colRent')}</th><th>${t('colCollection')}</th><th>${t('colDebt')}</th><th>${t('colExpense')||t('kpiGider')}</th><th>${t('colNet')}</th><th></th></tr></thead>
    <tbody>${brows}</tbody>
  </table></div></div>

  ${overdue?`<div class="sec-hdr">${t('dashOverdue')}</div>
  <div class="table-card"><div class="table-scroller"><table>
    <thead><tr><th>${t('colBuilding')}</th><th>${t('colUnit')}</th><th>${t('colTenant')}</th><th>${t('colPayDay')}</th><th>${t('colRent')}</th><th></th></tr></thead>
    <tbody>${overdue}</tbody>

  ${alerts?`<div class="sec-hdr">${t('dashContracts')}</div>

    <thead><tr><th>${t('colBuilding')}</th><th>${t('colUnit')}</th><th>${t('colTenant')}</th><th>${t('colEnd')}</th><th>${t('colRemaining')}</th><th>${t('colRent')}</th></tr></thead>
    <tbody>${alerts}</tbody>
  </table></div></div>`:''}`;
}

// ═══════════════════════════════════════════════
// BUILDING PAGE
// ═══════════════════════════════════════════════
function renderBld(bname){
  if(!bname) return '';
  if(!(DATA.buildings||[]).some(b=>b.id===bname&&b.active)){
    S.page='dash'; S.bld=null; return '';
  }
  const m=S.month;
  const tenants=sortU(safeTens(bname));
  const active=tenants.filter(t=>t.active&&t.rent>0);
  const inactive=tenants.filter(t=>!t.active);
  const rent=active.reduce((s,t)=>s+t.rent,0);
  const paid=paidTotal(bname,m);
  const ex=expTotal(bname,m);
  const net=paid-ex;
  const exps=safeExps(bname,m);
  const q=(S.search||'').toLowerCase();
  const filtered=tenants.filter(t=>{
    const matchQ=!q||t.name.toLowerCase().includes(q)||t.unit.toLowerCase().includes(q)||(t.phone||'').includes(q);
    if(!matchQ) return false;
    if(S.filter==='vacant') return !t.active;
    if(!t.active||t.rent===0) return !S.filter; // show inactive only when no filter
    const p=getP(t.id,m);
    if(S.filter==='overdue') return isDue(t,m);
    if(S.filter==='unpaid') return p.paid===0;
    if(S.filter==='partial') return p.paid>0&&p.paid<t.rent;
    if(S.filter==='paid') return p.paid>=t.rent;
    return true;
  });
  const bldUnpaid=active.filter(t=>getP(t.id,m).paid<t.rent);
  const bldPartial=bldUnpaid.filter(t=>getP(t.id,m).paid>0);
  const bldChips=[];
  if(bldUnpaid.length) bldChips.push(`<span class="op-chip op-chip-red" style="cursor:pointer" onclick="setFilter('overdue')">⚠️ ${bldUnpaid.length} ${t('colDebt')} · ${TL(rent-paid)} ${t('collectShort')}</span>`);
  if(bldPartial.length) bldChips.push(`<span class="op-chip op-chip-orange" style="cursor:pointer" onclick="setFilter('partial')">⋯ ${bldPartial.length} ${t('filterPartial')}</span>`);
  if(inactive.length) bldChips.push(`<span class="op-chip op-chip-gray" style="cursor:pointer" onclick="setFilter('vacant')">◌ ${inactive.length} ${t('filterVacant').replace('◌ ','')}</span>`);
  if(exps.length===0&&active.length) bldChips.push(`<span class="op-chip op-chip-blue" style="cursor:pointer" onclick="openMod('exp-add','${bname}')">📋 ${t('emptyExpenses')}</span>`);
  const bldAlertStrip=bldChips.length?`<div class="op-alerts">${bldChips.join('')}</div>`:'';
  const _fpOpts=[{k:'',l:t('filterAll')},{k:'overdue',l:t('filterOverdue')},{k:'unpaid',l:t('filterUnpaid')},{k:'partial',l:t('filterPartial')},{k:'paid',l:t('filterPaid')},{k:'vacant',l:t('filterVacant')}];
  const bldFilterPills=active.length?`<div class="filter-pills">${_fpOpts.map(({k,l})=>`<button class="fpill${S.filter===k?' fpill-active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}</div>`:'';

  const rows=filtered.map(t=>{
    const st=getStatus(t,m);
    const p=getP(t.id,m);
    const diff=p.paid-(t.rent||0);
    const late=isDue(t,m);
    return `<tr class="cp" onclick="openPanel('${bname}','${t.id}')">
      <td><b>${t.unit}</b><span class="c-muted" style="font-size:10px;margin-left:4px">${t.fl||''}</span></td>
      <td>${late?'<span class="blink">🔴</span> ':''}<b>${_esc(t.name||'—')}</b>${t.notes?` <span style="color:var(--i3);font-size:10px" title="${_esc(t.notes)}">ⓘ</span>`:''}</td>
      <td class="cb fw7">${t.rent?TL(t.rent):'—'}</td>
      <td class="${p.paid>=(t.rent||0)?'c-green':p.paid>0?'c-orange':'c-red'} fw7">${t.rent?TL(p.paid):'—'}</td>
      <td class="${diff>0?'c-green':diff<0?'c-red':'c-muted'}">${t.rent?(diff>0?'+':'')+TL(diff):'—'}</td>

      <td class="c-muted">${p.sekil||'—'}</td>
      <td class="nowrap">
        ${canEdit()?`<button class="btn btn-xs bsu- " onclick="event.stopPropagation();openMod('pay-add','${bname}:${t.id}')">💳</button>

      </td>
    </tr>`;
  }).join('');

  const expRows=exps.map((e,i)=>`<tr>
    <td class="mono ${canEdit()?'editable':''}" ondblclick="if(canEdit())makeEditable(this,v=>{((DATA.expenses['${bname}']||{})['${m}']||[])[${i}].no=v;saveLocal();toast('✅','green');})">${e.no||'—'}</td>

    <td class="cm ${canEdit()?'editable':''}" ondblclick="if(canEdit())makeEditable(this,v=>{((DATA.expenses['${bname}']||{})['${m}']||[])[${i}].tarih=v;saveLocal();})">${e.tarih||'—'}</td>
    <td class="cm ${canEdit()?'editable':''}" ondblclick="if(canEdit())makeEditable(this,v=>{((DATA.expenses['${bname}']||{})['${m}']||[])[${i}].notlar=v;saveLocal();})">${e.notlar||''}</td>
    <td class="nowrap">${canEdit()?`
      <button class="btn btn-xs bg-" onclick="editExp('${bname}','${m}',${i})">✏️</button>
      <button class="btn btn-xs bd-" onclick="delExp('${bname}','${m}',${i})">🗑</button>`:''}
    </td>
  </tr>`).join('');

  return monthBar()+`
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <input type="text" class="form-input" style="width:200px" placeholder="${t('searchBldTenant')}" oninput="S.search=this.value;render()" value="${S.search}">
    <div style="flex:1"></div>
    ${canEdit()?`<button class="btn btn-primary btn-sm" onclick="openMod('ten-add','${bname}')">${t('btnAddTenant')}</button>
    <button class="btn btn-secondary btn-sm" onclick="openMod('pay-add','${bname}')">${t('btnAddPayment')}</button>
    <button class="btn btn-secondary btn-sm" onclick="openMod('exp-add','${bname}')">${t('btnAddExpense')}</button>`:''}
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card" style="--kpi-color:var(--teal-l)"><div class="kpi-icon">👤</div><div class="kpi-value">${active.length}</div><div class="kpi-label">${t('kpiActive')}</div></div>

  </div>
  ${bldAlertStrip}${bldFilterPills}

  ${inactive.length&&canEdit()&&S.filter!=='vacant'?`<div class="table-card" style="margin-top:8px;opacity:.75">

      <thead><tr><th>${t('colUnit')}</th><th>${t('colTenant')}</th><th>${t('colPhone')}</th><th>${t('colNote')}</th><th></th></tr></thead>
      <tbody>${inactive.map(t=>`<tr style="opacity:.75">

      </tr>`).join('')}</tbody>

  const m=S.month;
  const p=getP(tid,m);

  // Build history
  const histRows=ALL_MONTHS.filter(mo=>{
    const pp=((DATA.payments[tid]||{})[mo]);
    return pp!==undefined;

    const pp=getP(tid,mo);
    const dot=pp.paid>=(t.rent||0)?'var(--emerald)':pp.paid>0?'var(--amber)':'var(--rose)';

// openModal is the public alias (used in HTML); openMod is internal
function openModal(type,arg){ openMod(type,arg); }

var _openModalState=null;

function openMod(type,arg){
  // Non-edit types allowed for all roles
  const noEditTypes=['cloud','users','settings','dash-prefs','reset-data','restore-confirm'];
  if(!canEdit()&&!noEditTypes.includes(type)) return;
  const md=document.getElementById('modal');
  const tpl={
    'bld-add':()=>tplBldAdd(),
    'bld-rename':()=>tplBldRename(arg||''),
    'bld-archive':()=>tplBldArchive(arg||''),
    'bld-settings':()=>tplBldSettings(arg||''),
    'pay-add':()=>tplPayAdd(arg||''),
    'exp-add':()=>tplExpAdd(arg||''),
    'ten-add':()=>tplTenAdd(arg||''),
    'ten-edit':()=>tplTenEdit(arg||''),
    'cloud':()=>tplCloud(),
    'users':()=>tplUsers(),
    'settings':()=>tplSettings(),
    'dash-prefs':()=>tplDashPrefs(),
    'reset-data':()=>tplResetData(),
    'restore-confirm':()=>tplRestoreConfirm(arg||''),
    'mgmt-month':()=>tplMgmtMonth(arg||''),
  };
  // Unknown type → show error state instead of silently using pay-add
  const tplFn = tpl[type];
  if(!tplFn){
    md.innerHTML=`<div class="modal-title">${t('unknownOp')}</div>
      <p style="color:var(--i3);font-size:13px">"${type}" ${t('typeNotConfigured')}</p>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeMod()">${t('close')}</button></div>`;
  } else {
    md.innerHTML=tplFn();
  }
  _openModalState={type:type,arg:arg};
  document.getElementById('modal-overlay').classList.add('open');
  if(type==='pay-add'){
    setTimeout(()=>{
      refreshTenSel();
      if(arg){const[b,id]=arg.split(':');const sel=document.getElementById('m_b');if(sel&&b)sel.value=b;refreshTenSel();if(id){const ks=document.getElementById('m_t');if(ks)ks.value=id;autoRent();}}
      setTimeout(()=>{const a=document.getElementById('m_amt');if(a)a.select();},100);
    },50);
  } else {
    setTimeout(()=>{const inp=document.querySelector('#modal input:not([type=hidden]):not([disabled])');if(inp)inp.focus();},80);
  }
}
function closeMod(){_openModalState=null;document.getElementById('modal-overlay').classList.remove('open');}
function closeMO(e){if(e.target===document.getElementById('modal-overlay'))closeMod();}

function tplBldRename(bldId){
  const b=(DATA.buildings||[]).find(x=>x.id===bldId);
  if(!b) return `<div class="modal-title">❌ ${t('emptyRecords')}</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeMod()">${t('close')}</button></div>`;
  const safeName=b.name.replace(/"/g,'&quot;');

  return `<div class="modal-title">${t('bldRenameTitle')}</div>

  </div>`;
}

function commitBldRename(bldId){
  const inp=document.getElementById('m-bld-rename');
  if(!inp) return;
  const newName=inp.value.trim();
  if(!newName||newName.length<2){ inp.focus(); toast(t('errMinChars'),'red'); return; }
  const b=(DATA.buildings||[]).find(x=>x.id===bldId);
  if(!b){ toast(t('bldNotFound'),'red'); return; }
  const dup=(DATA.buildings||[]).some(x=>x.id!==bldId&&x.name.trim().toLowerCase()===newName.toLowerCase());
  if(dup){ inp.focus(); toast(t('errBldNameDup'),'red'); return; }
  const oldName=b.name;
  b.name=newName;
  b.short=newName.split(/\s+/).map(w=>w.replace(/[^a-zA-ZğüşöçıĞÜŞÖÇİ]/gi,'')[0]||'')
    .join('').toUpperCase().slice(0,3)||newName.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(0,3)||'BLD';
  BL[bldId]=newName; BS[bldId]=b.short;
  syncBuildingConstants();
  renderBuildingNav();
  if(S.bld===bldId){ const t=document.getElementById('topbar-title'); if(t) t.textContent='🏢 '+newName; }
  saveLocal();
  addHist('Bina adlandırıldı: '+oldName+' → '+newName);
  closeMod();
  toast(t('bldRenamed'),'green');
}
window.commitBldRename=commitBldRename;

function refreshTenSel(){
  const b=document.getElementById('m_b')?.value;
  const sel=document.getElementById('m_t');
  if(!sel||!b) return;
  const ts=sortU((DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0));
  sel.innerHTML=ts.map(t=>`<option value="${t.id}">${_esc(t.unit)} – ${_esc(t.name)}</option>`).join('');
  autoRent();
}

function autoRent(){
  const b=document.getElementById('m_b')?.value;
  const tid=document.getElementById('m_t')?.value;
  const amt=document.getElementById('m_amt');
  if(!b||!tid||!amt) return;
  const t=(DATA.tenants[b]||[]).find(x=>x.id===tid);
  if(t) amt.value=t.rent;
}

function savePay(){
  const b=document.getElementById('m_b')?.value;
  const tid=document.getElementById('m_t')?.value;
  const mo=document.getElementById('m_mo')?.value;
  const paid=parseFloat(document.getElementById('m_amt')?.value)||0;
  const date=document.getElementById('m_dt')?.value||'';
  const sekil=document.getElementById('m_sk')?.value||'Banka';
  const notes=document.getElementById('m_nt')?.value||'';
  if(!b||!tid||!mo) return;
  const t=(DATA.tenants[b]||[]).find(x=>x.id===tid);
  setP(tid,mo,{paid,date,sekil,notes});
  addHist(`${BL[b]} ${t?.unit||''} – ${t?.name||''}: ${TL(paid)} ödeme (${mo})`);
  autoRecalc();
  closeMod();render();updateBadges();
  toast(t('paymentSaved'),'green');
  if(DATA.cloud.enabled) cloudSync('push');
}

function savePayRepeat(){
  const b=document.getElementById('m_b')?.value;
  const tid=document.getElementById('m_t')?.value;
  const mo=document.getElementById('m_mo')?.value;
  const paid=parseFloat(document.getElementById('m_amt')?.value)||0;
  const date=document.getElementById('m_dt')?.value||'';
  const sekil=document.getElementById('m_sk')?.value||'Banka';
  const notes=document.getElementById('m_nt')?.value||'';
  if(!b||!tid||!mo){toast(t('payBldTenReq'),'red');return;}
  const t=(DATA.tenants[b]||[]).find(x=>x.id===tid);
  setP(tid,mo,{paid,date,sekil,notes});
  addHist(`${BL[b]} ${t?.unit||''} – ${t?.name||''}: ${TL(paid)} ödeme (${mo})`);
  _lastSekil=sekil;
  autoRecalc();saveLocal();updateBadges();
  // Auto-advance to next tenant in the dropdown
  const sel=document.getElementById('m_t');
  const hasNext=sel&&sel.selectedIndex<sel.options.length-1;
  if(hasNext){sel.selectedIndex++;autoRent();}
  const ntEl=document.getElementById('m_nt');if(ntEl)ntEl.value='';
  const amtEl=document.getElementById('m_amt');
  if(amtEl){if(!hasNext)amtEl.value='';amtEl.focus();amtEl.select();}
  toast(hasNext?t('paymentSavedNext'):t('paymentSaved'),'green');
  if(DATA.cloud.enabled) cloudSync('push');
}

function saveExp_(eb,emo,eidx){
  const b=eb||document.getElementById('e_b')?.value;
  const mo=emo||document.getElementById('e_mo')?.value;
  const tur=(document.getElementById('e_tur')?.value||'').trim().toUpperCase();
  const no=(document.getElementById('e_no')?.value||'').trim();
  const tutar=parseFloat(document.getElementById('e_amt')?.value)||0;
  const tarih=document.getElementById('e_dt')?.value||'';
  const notlar=document.getElementById('e_nt')?.value||'';
  if(!b||!mo||!tur){toast(t('expTypeReq'),'red');return;}
  if(!DATA.expenses[b]) DATA.expenses[b]={};
  if(!DATA.expenses[b][mo]) DATA.expenses[b][mo]=[];
  const entry={tur,no,tutar,tarih,notlar};
  if(eidx!==undefined) DATA.expenses[b][mo][eidx]=entry;
  else DATA.expenses[b][mo].push(entry);
  addHist(`${BL[b]} gider ${eidx!==undefined?'güncellendi':'eklendi'}: ${tur} ${TL(tutar)} (${mo})`);
  autoRecalc();
  closeMod();render();
  toast(t('expSaved'),'green');
  if(DATA.cloud.enabled) cloudSync('push');
}

function saveExpRepeat(){
  const b=document.getElementById('e_b')?.value;
  const mo=document.getElementById('e_mo')?.value;
  const tur=(document.getElementById('e_tur')?.value||'').trim().toUpperCase();

  ten.rent=parseFloat(document.getElementById('et_r').value)||0;
  ten.dep=parseFloat(document.getElementById('et_d').value)||0;

function pasteIntoField(id){
  const el=document.getElementById(id);
  if(!el) return toast(window.t('fieldNotFound'),'red');
  el.focus();
  const apply=v=>{
    if(typeof v==='string'&&v.trim()){
      el.value=v.trim();
      el.dispatchEvent(new Event('input',{bubbles:true}));
      el.dispatchEvent(new Event('change',{bubbles:true}));
      toast(window.t('pasted'),'blue');
    }
  };
  if(typeof window.electron!=='undefined'&&window.electron.readClipboard){
    window.electron.readClipboard().then(apply).catch(()=>toast(window.t('pasteManual'),'orange'));
  }else if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(apply).catch(()=>toast(window.t('pasteManual'),'orange'));
  }else{
    toast(window.t('pasteManual'),'orange');
  }
}

  const url  = (document.getElementById('c_url')?.value||'').trim().replace(/\/+$/,'');
  const user = (document.getElementById('c_user')?.value||'').trim();
  const pass = document.getElementById('c_pass')?.value||'';
  const msg  = document.getElementById('cloud-server-msg');
  if(!url||!user||!pass){ msg.textContent='❌ URL, kullanıcı adı ve şifre gerekli'; return; }
  msg.textContent='🔄 Bağlanıyor...'; msg.style.color='var(--i3)';
  const result = await cloudLogin(url, user, pass);
  if(!result.ok){ msg.textContent='❌ '+result.error; msg.style.color='var(--rose-l)'; return; }
  // Save auth
  DATA.cloud.serverUrl = url;
  DATA.cloud.url = url;
  DATA.cloud.token = result.token;
  DATA.cloud.key = result.token; // backwards compat
  DATA.cloud.username = user;
  DATA.cloud.enabled = true;
  DATA.cloud.user = result.user;
  saveLocal();
  msg.textContent='✅ Bağlandı: '+result.user.name+' ('+result.user.role+')';
  msg.style.color='var(--emerald-l)';
  updateCloudUI();
  toast('✅ Sunucuya bağlandı','green');
  addHist('Bulut sunucu bağlantısı: '+url+' ('+result.user.name+')');
}

async function checkCloudStatus(){
  const url = (DATA.cloud.serverUrl||DATA.cloud.url||'').replace(/\/+$/,'');
  const msg = document.getElementById('cloud-server-msg');
  if(!url){ if(msg) msg.textContent='❌ URL girilmedi'; return; }
  if(msg){ msg.textContent='🔄 Test ediliyor...'; msg.style.color='var(--i3)'; }
  const h = await checkServerHealth(url);
  if(h.ok){
    const txt = `✅ Sunucu aktif · v${h.version} · DB: ${h.db} · Uptime: ${h.uptime}s`;
    if(msg){ msg.textContent=txt; msg.style.color='var(--emerald-l)'; }
    toast('✅ Sunucu bağlantısı OK','green');
  } else {
    const txt = '❌ Sunucu yanıt vermiyor: '+h.error;
    if(msg){ msg.textContent=txt; msg.style.color='var(--rose-l)'; }
    toast('❌ Sunucu bağlantı hatası','red');
  }
}

async function openServerUserMgmt(){
  if(!DATA.cloud.token){ toast('⚠️ Önce sunucuya bağlanın','red'); return; }
  const url = (DATA.cloud.serverUrl||DATA.cloud.url||'').replace(/\/+$/,'');
  closeMod();
  // Fetch users from server
  try{
    const r = await fetch(url+'/users', {headers:{'Authorization':'Bearer '+DATA.cloud.token}});

async function commitServerPIN(url, userId){
  const np=(document.getElementById('svr_np')?.value||'').trim();
  const nc=(document.getElementById('svr_nc')?.value||'').trim();
  if(!np){ toast('❌ Şifre boş olamaz','red'); return; }
  if(np.length<6){ toast('❌ Min 6 karakter','red'); return; }
  if(np!==nc){ toast('❌ Şifreler eşleşmiyor','red'); return; }
  try{
    const r=await fetch(url+'/users/'+userId+'/reset-password',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DATA.cloud.token},
      body:JSON.stringify({newPassword:np})
    });
    const d=await r.json();
    if(d.ok){ toast('✅ Şifre güncellendi','green'); document.getElementById('server-user-form').innerHTML=''; }
    else toast('❌ '+d.error,'red');
  }catch(e){ toast('❌ '+e.message,'red'); }
}

async function serverToggleUser(url, userId, currentActive){

      body:JSON.stringify({active:!currentActive})

    const d = await r.json();
    if(d.ok){ toast(currentActive?'⏸ Pasif yapıldı':'✅ Aktif yapıldı','green'); openServerUserMgmt(); }
    else toast('❌ '+d.error,'red');
  }catch(e){ toast('❌ '+e.message,'red'); }
}

  if(!np){toast(t('pinEmpty'),'red');return;}
  if(np.length<4||!/^\d+$/.test(np)){toast(t('pinInvalid'),'red');return;}
  if(np!==nc){toast(t('pinMismatch'),'red');return;}
  const _cs=_genSalt();
  u.pin_hash_v2=await _hashPinV2(np,_cs);
  u.pin_salt=_cs;
  delete u.pin_hash;
  delete u.pin;
  addHist('PIN sıfırlandı: '+u.name);
  saveLocal();
  toast(t('pinUpdated'),'green');
  document.getElementById('modal').innerHTML=tplUsers();
}

function toggleUserActive(i){
  if(!canDeactivateUser(i)){toast(t('usersNoPermission'),'red');return;}
  const u=DATA.users[i];
  u.active=!(u.active!==false);
  addHist((u.active?'Aktifleştirildi':'Devre dışı')+': '+u.name);
  saveLocal();
  document.getElementById('modal').innerHTML=tplUsers();
  toast(u.active?t('userActivated'):t('userDeactivated'),u.active?'green':'red');
}

function delUserConfirm(i){
  if(!canDeleteUser(i)){toast(t('usersNoPermission'),'red');return;}
  const u=DATA.users[i];
  const btn=document.getElementById('btn-del-user-'+i);
  if(!btn) return;
  if(btn.dataset.step==='1'){
    DATA.users.splice(i,1);
    addHist('Kullanıcı silindi: '+u.name);
    saveLocal();
    document.getElementById('modal').innerHTML=tplUsers();
    toast('🗑 '+t('userDeleted'),'red');
  } else {
    btn.dataset.step='1';
    btn.textContent=t('deleteConfirm');
    btn.style.background='var(--rose)';
    setTimeout(()=>{ if(btn.dataset.step==='1') document.getElementById('modal').innerHTML=tplUsers(); },3000);
  }
}

async function saveEditUser(i){
  const u=DATA.users[i];

function renderPay(){
  const m=S.month;
  const q=(S.search||'').toLowerCase();
  let rows='';
  BK.forEach(b=>{
    sortU(safeTens(b)).filter(t=>{
      if(!t.active||t.rent===0) return false;
      const matchQ=!q||t.name.toLowerCase().includes(q)||t.unit.toLowerCase().includes(q)||(t.phone||'').includes(q);
      if(!matchQ) return false;
      const p=getP(t.id,m);
      if(S.filter==='overdue') return isDue(t,m);
      if(S.filter==='unpaid') return p.paid===0;
      if(S.filter==='partial') return p.paid>0&&p.paid<t.rent;
      if(S.filter==='paid') return p.paid>=t.rent;
      return true;
    }).forEach(tn=>{
      const p=getP(tn.id,m);
      const st=getStatus(tn,m);
      const diff=p.paid-(tn.rent||0);
      rows+=`<tr class="cp" onclick="openPanel('${b}','${tn.id}')">
        <td><b>${BL[b]}</b></td><td><b>${tn.unit}</b></td>
        <td>${isDue(tn,m)?'<span class="blink">🔴</span> ':''}${tn.name}</td>
        <td class="cb fw7">${TL(tn.rent)}</td>
        <td class="${p.paid>=(tn.rent||0)?'c-green':p.paid>0?'c-orange':'c-red'} fw7">${TL(p.paid)}</td>
        <td class="${diff>0?'c-green':diff<0?'c-red':'c-muted'}">${diff>0?'+':''}${TL(diff)}</td>
        <td><span class="badge ${st.cls}">${st.lbl}</span></td>
        <td class="c-muted">${p.date?p.date.slice(0,10):'—'}</td>
        <td class="c-muted">${p.sekil||'—'}</td>
        <td>${canEdit()?`<button class="btn btn-xs bsu-" onclick="event.stopPropagation();openMod('pay-add','${b}:${tn.id}')">${t('btnAddPayment')}</button>`:''}
        </td>
      </tr>`;
    });
  });
  const tRent=BK.reduce((s,b)=>s+rentTotal(b),0);
  const tPaid=BK.reduce((s,b)=>s+paidTotal(b,m),0);
  return monthBar()+`
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <input type="text" class="form-input" style="width:220px" placeholder="${t('searchPayTenant')}" oninput="S.search=this.value;render()" value="${S.search}">
    <div style="flex:1"></div>
    ${canEdit()?`<button class="btn btn-primary btn-sm" onclick="openMod('pay-add')">${t('btnAddPayment')}</button>`:''}
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️</button>
  </div>
  <div class="filter-pills">${[{k:'',l:t('filterAll')},{k:'overdue',l:t('filterOverdue')},{k:'unpaid',l:t('filterUnpaid')},{k:'partial',l:t('filterPartial')},{k:'paid',l:t('filterPaid')}].map(({k,l})=>`<button class="fpill${S.filter===k?' fpill-active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}</div>
  <div class="table-card">
    <div class="table-card-header">
      <h3>${t('allPayments')} — ${monthLabel(m)}</h3>
      ${tRent>0?`<span style="font-size:11px;color:${tPaid>=tRent?'var(--emerald-l)':'var(--amber-l)'}">
        ${tPaid>=tRent?t('collectFull'):'⚠️ '+TL(tRent-tPaid)+' '+t('collectShort')+' · '+Math.round(tPaid/tRent*100)+'%'}
      </span>`:''}
    </div>
    <div class="table-scroller"><table>
      <thead><tr><th>${t('colBuilding')}</th><th>${t('colUnit')}</th><th>${t('colTenant')}</th><th>${t('colRent')}</th><th>${t('colPaid')}</th><th>${t('colDiff')}</th><th>${t('colStatus')}</th><th>${t('colDate')}</th><th>${t('colMethod')}</th><th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="10" class="empty-state-text">${t('emptyRecords')}</td></tr>`}
      <tr class="tfoot-row"><td colspan="3">${t('totalAll')}</td><td class="c-blue">${TL(tRent)}</td><td class="${tPaid>=tRent?'c-green':'c-orange'}">${TL(tPaid)}</td><td class="${tPaid-tRent>=0?'c-green':'c-red'}">${TL(tPaid-tRent)}</td><td colspan="4"></td></tr>
      </tbody>
    </table></div>
  </div>`;
}

let chartInstances={};
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});chartInstances={};}

function initCharts(){
  destroyCharts();
  const _isLight=document.documentElement.getAttribute('data-theme')==='light';
  const theme={grid:_isLight?'rgba(30,50,100,.12)':'rgba(26,48,84,.4)',text:_isLight?'#1e3a6a':'#7d9ec8'};
  const co={responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:theme.text,font:{size:11}}}}};

  // Alper bar + line
  const mgmtMos=Object.keys(DATA.mgmt);
  const mgmtVals=mgmtMos.map(m=>DATA.mgmt[m].net||0);
  const mgmtCol=mgmtMos.map(m=>DATA.mgmt[m].col||0);
  const c1=document.getElementById('ch-mgmt');
  if(c1) chartInstances.mgmt=new Chart(c1,{
    type:'bar',
    data:{
      labels:mgmtMos.map(m=>m.replace(' ','<br>')),
      datasets:[
        {label:t('chartNetDebt'),data:mgmtVals,backgroundColor:mgmtVals.map(v=>v>=0?'rgba(30,214,120,.6)':'rgba(240,84,84,.6)'),borderRadius:4},
        {label:t('kpiCollect'),data:mgmtCol,type:'line',borderColor:'rgba(74,138,244,.8)',backgroundColor:'rgba(74,138,244,.1)',pointRadius:3,tension:.3,fill:true,yAxisID:'y2'},
      ]
    },
    options:{...co,scales:{
      x:{ticks:{color:theme.text,font:{size:9},maxRotation:45},grid:{color:theme.grid}},
      y:{ticks:{color:theme.text,callback:v=>money(v)},grid:{color:theme.grid}},
      y2:{position:'right',ticks:{color:'rgba(74,138,244,.7)',callback:v=>money(v)},grid:{display:false}},
    }}
  });

  // Bina bar
  const m=S.month;
  const c2=document.getElementById('ch-bina');
  if(c2) chartInstances.bina=new Chart(c2,{
    type:'bar',
    data:{
      labels:BK.map(b=>BL[b]),
      datasets:[
        {label:t('colRent'),data:BK.map(b=>rentTotal(b)),backgroundColor:'rgba(74,138,244,.5)',borderRadius:4},
        {label:t('kpiCollect'),data:BK.map(b=>paidTotal(b,m)),backgroundColor:'rgba(30,214,120,.6)',borderRadius:4},
        {label:t('kpiGider'),data:BK.map(b=>expTotal(b,m)),backgroundColor:'rgba(245,166,35,.6)',borderRadius:4},
      ]
    },
    options:{...co,scales:{
      x:{ticks:{color:theme.text},grid:{color:theme.grid}},
      y:{ticks:{color:theme.text,callback:v=>money(v)},grid:{color:theme.grid}},
    }}
  });

  // Tan sokak line
  const tanMos=Object.keys(DATA.tanNet);
  const c3=document.getElementById('ch-tan');
  if(c3) chartInstances.tan=new Chart(c3,{
    type:'line',
    data:{
      labels:tanMos,
      datasets:[
        {label:t('colNetTL'),data:tanMos.map(m=>(DATA.tanNet[m].net||0)),borderColor:'rgba(6,214,160,.8)',backgroundColor:'rgba(6,214,160,.1)',pointRadius:4,tension:.3,fill:true},
        {label:t('kpiCollect'),data:tanMos.map(m=>(DATA.tanNet[m].col||0)),borderColor:'rgba(74,138,244,.6)',backgroundColor:'transparent',pointRadius:3,tension:.3},
      ]
    },
    options:{...co,scales:{
      x:{ticks:{color:theme.text},grid:{color:theme.grid}},
      y:{ticks:{color:theme.text,callback:v=>money(v)},grid:{color:theme.grid}},
    }}
  });

  // Payment status donut
  let paid=0,partial=0,unpaid=0;
  BK.forEach(b=>(DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0).forEach(t=>{
    const p=getP(t.id,m);
    if(p.paid>=t.rent) paid++;
    else if(p.paid>0) partial++;
    else unpaid++;
  }));
  const c4=document.getElementById('ch-durum');
  if(c4) chartInstances.durum=new Chart(c4,{
    type:'doughnut',

function buildWAMsg(bname,t,mo){
  return `Merhaba ${t.name} Bey/Hanım, ${BL[bname]} ${t.unit} için ${mo} kira ödemeniz (${TL(t.rent)}) henüz görünmüyor. Rica etsek kontrol edip bilgi verebilir misiniz? Teşekkürler.`;
}

function waMsg(bname,tid,mo){
  const t=(DATA.tenants[bname]||[]).find(x=>x.id===tid);
  if(!t) return;
  const msg=buildWAMsg(bname,t,mo);
  const phone=(t.phone||'').replace(/\D/g,'');
  const url=phone?`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
  logWA(bname,tid,mo);
}

function logWA(bname,tid,mo){
  const t=(DATA.tenants[bname]||[]).find(x=>x.id===tid);
  if(!t) return;
  if(!DATA.waLog) DATA.waLog=[];
  DATA.waLog.push({t:new Date().toLocaleString((DATA.settings?.lang||'tr')==='en'?'en-US':'tr-TR'),bina:BL[bname],unit:t.unit,name:t.name,mo});
  if(DATA.waLog.length > 500) DATA.waLog.shift();
  addHist(`WA gönderildi: ${BL[bname]} ${t.unit} – ${t.name} (${mo})`);
  saveLocal();toast(window.t('waSaveLog'),'blue');
}

function sendAllWA(mo){
  BK.forEach(b=>(DATA.tenants[b]||[]).filter(t=>{
    if(!t.active||t.rent===0) return false;
    return isDue(t,mo)||getP(t.id,mo).paid<t.rent;
  }).forEach((t,i)=>{
    setTimeout(()=>{
      const phone=(t.phone||'').replace(/\D/g,'');
      if(phone){
        const msg=buildWAMsg(b,t,mo);
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
        logWA(b,t.id,mo);
      }
    },i*800);
  }));
}

function makeEditable(el, onSave){
  if(!canEdit()) return;
  el.contentEditable='true';
  el.classList.add('editable');
  el.addEventListener('blur',()=>{
    el.contentEditable='false';
    el.classList.remove('editable');
    onSave(el.textContent.trim());
    autoRecalc();
    saveLocal();
    if(DATA.cloud.enabled) cloudSync('push');
  },{once:true});
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();el.blur();}
    if(e.key==='Escape'){el.contentEditable='false';el.classList.remove('editable');}
  },{once:true});
  el.focus();
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
}

// AUTO-RECALCULATE ACCOUNTING
// ═══════════════════════════════════════════════
function autoRecalc(){
  // Recalc alper rows from actual data
  Object.keys(DATA.mgmt).forEach(mo=>{
    const a=DATA.mgmt[mo];
    if(a.col!==undefined && a.exp!==undefined){
      a.net = (a.col||0) - (a.exp||0);
    }
  });
  // Recalc tanNet from expenses
  Object.keys(DATA.tanNet).forEach(mo=>{
    const d=DATA.tanNet[mo];
    const actualExp = expTotal('BINA3', mo);
    const actualPaid = paidTotal('BINA3', mo);
    if(actualExp>0) d.exp=actualExp;
    if(actualPaid>0) d.col=actualPaid;
    d.net = (d.col||0) - (d.exp||0);
    d.eur = (d.kur&&d.kur>0) ? d.net/d.kur : 0;
  });
  // Recalc gayNet
  Object.keys(DATA.gayNet).forEach(mo=>{
    const d=DATA.gayNet[mo];
    const actualExp = expTotal('BINA1', mo);
    const actualPaid = paidTotal('BINA1', mo);
    if(actualExp>0) d.exp=actualExp;
    if(actualPaid>0) d.col=actualPaid;
    d.net = (d.col||0) - (d.exp||0);
    d.eur = (d.kur&&d.kur>0) ? d.net/d.kur : 0;
  });
}
