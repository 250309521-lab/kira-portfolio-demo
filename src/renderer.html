let vizState={
  angle:0, tilt:0.4, zoom:1, dragging:false, lastX:0, lastY:0,
  animating:true, filter:'', mode:'all', hoveredBar:null, animFrame:null
};

function initViz(){
  const canvas=document.getElementById('viz-canvas');
  if(!canvas) return;
  const wrap=document.getElementById('viz-wrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  
  canvas.onmousedown=e=>{vizState.dragging=true;vizState.lastX=e.clientX;vizState.lastY=e.clientY;canvas.style.cursor='grabbing';};
  canvas.onmouseup=e=>{
    if(Math.abs(e.clientX-vizState.lastX)<3&&Math.abs(e.clientY-vizState.lastY)<3) handleVizClick(e);
    vizState.dragging=false;canvas.style.cursor='grab';
  };
  canvas.onmousemove=e=>{
    if(vizState.dragging){
      vizState.angle+=(e.clientX-vizState.lastX)*0.008;
      vizState.tilt=Math.max(0.1,Math.min(1.2,vizState.tilt+(e.clientY-vizState.lastY)*0.005));
      vizState.lastX=e.clientX;vizState.lastY=e.clientY;
    }
    handleVizHover(e,canvas);
  };
  canvas.onwheel=e=>{e.preventDefault();vizState.zoom=Math.max(0.4,Math.min(2.5,vizState.zoom-e.deltaY*0.001));};
  canvas.onmouseleave=()=>{document.getElementById('viz-tip').style.display='none';};
  
  if(vizState.animFrame) cancelAnimationFrame(vizState.animFrame);
  vizLoop(canvas);
}

function buildVizData(filter,mode){
  const m=S.month;
  const bars=[];
  const bNames=BK.slice();
  const bColors=['#4a8af4','#7b6cf6','#06d6a0','#f59e0b','#ef4444','#10b981'];
  const q=(filter||'').toLowerCase();
  
  bNames.forEach((b,bi)=>{
    const tenants=(DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0&&(!q||t.name.toLowerCase().includes(q)||t.unit.toLowerCase().includes(q)||(BL[b]).toLowerCase().includes(q)));
    const exp=expTotal(b,m);
    const paid=paidTotal(b,m);
    const rent=rentTotal(b);
    
    // Building summary bar
    let val=0;
    if(mode==='payments') val=paid;
    else if(mode==='expenses') val=exp;
    else if(mode==='net') val=paid-exp;
    else val=rent;
    
    bars.push({label:BL[b],val,type:'building',color:bColors[bi%bColors.length],bld:b,paid,rent,exp,net:paid-exp,tenants:tenants.length});
    
    // Per-tenant bars if not too many and filter active
    if(q||tenants.length<=12){
      tenants.forEach(t=>{
        const p=getP(t.id,m);
        let tv=0;
        if(mode==='payments') tv=p.paid;
        else if(mode==='expenses') tv=0;
        else if(mode==='net') tv=p.paid-t.rent;
        else tv=t.rent;
        bars.push({label:t.unit+' '+t.name.split(' ')[0],val:tv,type:'tenant',color:p.paid>=t.rent?'#1ed678':'#f05454',bld:b,bIdx:bi,paid:p.paid,rent:t.rent,name:t.name,unit:t.unit});
      });
    }
  });
  return bars;
}

let vizBars=[];
function vizLoop(canvas){
  const ctx=canvas.getContext('2d');
  const draw=()=>{
    if(!document.getElementById('viz-canvas')){return;}
    canvas.width=canvas.parentElement.clientWidth;
    canvas.height=canvas.parentElement.clientHeight;
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    
    // BG gradient
    const _vLight=document.documentElement.getAttribute('data-theme')==='light';
    const bg=ctx.createLinearGradient(0,0,0,H);
    if(_vLight){bg.addColorStop(0,'#dce8f8');bg.addColorStop(1,'#c8d8f0');}
    else{bg.addColorStop(0,'#07101f');bg.addColorStop(1,'#0d1829');}
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // Grid lines
    ctx.strokeStyle=_vLight?'rgba(30,50,100,.15)':'rgba(26,48,84,.4)';ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const y=H*0.8-(H*0.6)*(i/5);
      ctx.beginPath();ctx.moveTo(W*0.05,y);ctx.lineTo(W*0.95,y);ctx.stroke();
      ctx.fillStyle=_vLight?'rgba(30,50,100,.5)':'rgba(125,158,200,.4)';ctx.font='10px Segoe UI';ctx.textAlign='right';
    }
    
    const data=buildVizData(vizState.filter,vizState.mode);
    vizBars=[];
    if(!data.length){ctx.fillStyle=_vLight?'rgba(30,50,100,.45)':'rgba(125,158,200,.5)';ctx.font='14px Segoe UI';ctx.textAlign='center';ctx.fillText(t('chartNoData'),W/2,H/2);return;}
    
    const maxVal=Math.max(1,...data.map(d=>Math.abs(d.val)));
    const n=data.length;
    const bw=Math.min(60,Math.max(18,(W*0.88)/n-4));
    const startX=W*0.06;
    const baseY=H*0.78;
    const maxH=H*0.52;
    
    data.forEach((d,i)=>{
      const x=startX+i*(bw+4);
      const barH=Math.max(2,Math.abs(d.val)/maxVal*maxH);
      const y=d.val>=0?baseY-barH:baseY;
      const isHov=(vizState.hoveredBar===i);
      
      // 3D effect (right face)
      const depth=isHov?12:8;
      const col=d.color;
      // Darken color for side face
      ctx.fillStyle=col+'99';
      ctx.beginPath();
      ctx.moveTo(x+bw,y);ctx.lineTo(x+bw+depth,y-depth);
      ctx.lineTo(x+bw+depth,baseY-depth+(d.val<0?barH:0));
      ctx.lineTo(x+bw,baseY+(d.val<0?barH:0));
      ctx.closePath();ctx.fill();
      // Top face
      ctx.fillStyle=col+'cc';
      ctx.beginPath();
      ctx.moveTo(x,y);ctx.lineTo(x+depth,y-depth);
      ctx.lineTo(x+bw+depth,y-depth);ctx.lineTo(x+bw,y);
      ctx.closePath();ctx.fill();
      // Front face
      const grad=ctx.createLinearGradient(x,y,x+bw,y+barH);
      grad.addColorStop(0,col+(isHov?'ff':'cc'));
      grad.addColorStop(1,col+'88');
      ctx.fillStyle=grad;
      ctx.fillRect(x,y,bw,barH);
      // Glow on hover
      if(isHov){ctx.shadowColor=col;ctx.shadowBlur=15;ctx.fillRect(x,y,bw,barH);ctx.shadowBlur=0;}
      
      // Store hitbox
      vizBars.push({x,y,w:bw,h:barH,d,i});
      
      // Label
      ctx.fillStyle=isHov?(_vLight?'#0f1f3c':'#fff'):(_vLight?'rgba(30,50,100,.7)':'rgba(125,158,200,.8)');
      ctx.font=`${bw>30?10:8}px Segoe UI`;ctx.textAlign='center';
      const shortLabel=d.label.length>8?d.label.slice(0,7)+'…':d.label;
      if(bw>20) ctx.fillText(shortLabel,x+bw/2,baseY+14);
      
      // Value on top
      if(isHov||bw>35){
        ctx.fillStyle=_vLight?'#0f1f3c':'#fff';ctx.font='bold 10px Segoe UI';
        const _cs=currencySymbol();const vStr=Math.abs(d.val)>=1000?_cs+(d.val/1000).toFixed(0)+'K':_cs+d.val.toFixed(0);
        ctx.fillText(vStr,x+bw/2,y-depth-4);
      }
    });

    // Baseline
    ctx.strokeStyle=_vLight?'rgba(37,99,235,.25)':'rgba(74,138,244,.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W*0.04,baseY);ctx.lineTo(W*0.96,baseY);ctx.stroke();

    // Axis label
    ctx.fillStyle=_vLight?'rgba(30,50,100,.5)':'rgba(125,158,200,.5)';ctx.font='10px Segoe UI';ctx.textAlign='left';
    const _sym=currencySymbol();
    ctx.fillText(_sym+'0',W*0.02,baseY+4);
    const maxLbl=maxVal>=1e6?_sym+(maxVal/1e6).toFixed(1)+'M':maxVal>=1000?_sym+(maxVal/1000).toFixed(0)+'K':_sym+maxVal.toFixed(0);
    ctx.fillText(maxLbl,W*0.02,H*0.78-maxH-2);
    
    if(vizState.animating){vizState.angle+=0.003;}
    vizState.animFrame=requestAnimationFrame(draw);
  };
  draw();
}

function handleVizHover(e,canvas){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let found=-1;
  vizBars.forEach((b,i)=>{if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h)found=i;});
  vizState.hoveredBar=found;
  const tip=document.getElementById('viz-tip');
  if(found>=0){
    const d=vizBars[found].d;
    tip.style.display='block';
    tip.style.left=(e.clientX-canvas.getBoundingClientRect().left+10)+'px';
    tip.style.top=(e.clientY-canvas.getBoundingClientRect().top-20)+'px';
    tip.innerHTML=`<div style="font-weight:700;margin-bottom:4px">${d.label}</div>
      ${d.type==='building'?`
        <div>${t('colRent')}: <b class="c-blue">${TL(d.rent||0)}</b></div>
        <div>${t('colCollection')}: <b class="c-green">${TL(d.paid||0)}</b></div>
        <div>${t('kpiGider')}: <b class="c-orange">${TL(d.exp||0)}</b></div>
        <div>${t('colNet')}: <b class="${(d.net||0)>=0?'c-green':'c-red'}">${TL(d.net||0)}</b></div>
        <div>${t('colTenant')}: ${d.tenants}</div>`:`
        <div>${BL[d.bld]}</div>
        <div>${t('colRent')}: <b class="c-blue">${TL(d.rent||0)}</b></div>
        <div>${t('colPaid')}: <b class="${d.paid>=d.rent?'c-green':'c-red'}">${TL(d.paid||0)}</b></div>
        <div>${t('colDiff')}: <b class="${d.paid-d.rent>=0?'c-green':'c-red'}">${TL(d.paid-d.rent)}</b></div>`}`;
  } else {tip.style.display='none';}
}

function handleVizClick(e){
  if(vizState.hoveredBar===null||vizState.hoveredBar<0) return;
  const bar=vizBars[vizState.hoveredBar];
  if(!bar) return;

// TOAST
// ═══════════════════════════════════════════════
function toast(msg,type='green'){
  const el=document.getElementById('toast');
  if(!el) return;
  const cfg={
    green:  {color:'var(--emerald-l)',bg:'var(--ok-bg)',  bd:'var(--ok-bd)'},
    blue:   {color:'var(--blue-l)',   bg:'var(--info-bg)',bd:'var(--info-bd)'},
    red:    {color:'var(--rose-l)',   bg:'var(--err-bg)', bd:'var(--err-bd)'},
    orange: {color:'var(--amber-l)',  bg:'var(--warn-bg)',bd:'var(--warn-bd)'},
    violet: {color:'var(--violet-l)', bg:'rgba(139,92,246,.09)',bd:'rgba(139,92,246,.2)'},
  };
  const c=cfg[type]||cfg.green;
  el.style.color=c.color;
  el.style.background=c.bg;
  el.style.borderColor=c.bd;
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

let cmdSelectedIdx = -1;
let cmdItems = [];

function openCMD(){
  document.getElementById('cmd-overlay').classList.add('open');
  const inp = document.getElementById('cmd-input');
  inp.value = '';
  cmdSearch('');
  setTimeout(()=>inp.focus(), 50);
}
function closeCMD(e){
  if(!e || e.target===document.getElementById('cmd-overlay'))
    document.getElementById('cmd-overlay').classList.remove('open');
}
function closeKbd(){document.getElementById('cmd-overlay').classList.remove('open');}

function cmdSearch(q){
  const Q = (q||'').toLowerCase().trim();
  const results = document.getElementById('cmd-results');
  cmdItems = [];
  cmdSelectedIdx = -1;
  let html = '';

  // ── Actions ──
  const actions = [
    {icon:'💳',title:t('fabPayment'),sub:t('cmdActAddPaySub'),action:()=>{openModal('pay-add');closeKbd();}},
    {icon:'💸',title:t('fabExpense'),sub:t('cmdActAddExpSub'),action:()=>{openModal('exp-add');closeKbd();}},
    {icon:'👤',title:t('fabTenant'),sub:t('cmdActAddTenSub'),action:()=>{openModal('ten-add','');closeKbd();}},
    {icon:'📊',title:t('cmdActDash'),sub:t('cmdActDashSub'),action:()=>{goto('dash');closeKbd();}},
    {icon:'💬',title:t('navWA'),sub:t('cmdActWASub'),action:()=>{goto('wa');closeKbd();}},
    {icon:'📈',title:t('navCharts'),sub:t('cmdActChartsSub'),action:()=>{goto('charts');closeKbd();}},
    {icon:'📄',title:t('navRep'),sub:t('cmdActRepSub'),action:()=>{goto('rep');closeKbd();}},
    {icon:'🌐',title:t('navViz'),sub:t('cmdActVizSub'),action:()=>{goto('viz');closeKbd();}},
    {icon:'☁️',title:t('navCloud'),sub:t('cmdActCloudSub'),action:()=>{openModal('cloud');closeKbd();}},
    {icon:'💾',title:t('cmdActSave'),sub:t('cmdActSaveSub'),action:()=>{manualSave();closeKbd();}},
    {icon:'📤',title:t('navExportCSV'),sub:t('cmdActCSVSub'),action:()=>{exportCSV();closeKbd();}},
    {icon:'📥',title:t('navExportJSON'),sub:t('cmdActJSONSub'),action:()=>{exportJSON();closeKbd();}},
    {icon:'🖨️',title:t('navPrint'),sub:t('cmdActPrintSub'),action:()=>{window.print();closeKbd();}},
  ];
  const filteredActions = Q ? actions.filter(a=>a.title.toLowerCase().includes(Q)||a.sub.toLowerCase().includes(Q)) : actions.slice(0,6);
  if(filteredActions.length){
    html += '<div class="cmd-group-label">'+t('cmdGrpActions')+'</div>';
    filteredActions.forEach(a=>{
      const idx = cmdItems.length;
      cmdItems.push(a);
      html += `<div class="cmd-item" data-idx="${idx}" onclick="cmdRun(${idx})">
        <div class="cmd-item-icon">${a.icon}</div>
        <div class="cmd-item-label">
          <div class="cmd-item-title">${a.title}</div>
          <div class="cmd-item-sub">${a.sub}</div>
        </div>
      </div>`;
    });
  }

  // ── Tenants ──
  if(Q.length>=1){
    const tenantHits=[];
    BK.forEach(b=>{
      (DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0).forEach(t=>{
        if(t.name.toLowerCase().includes(Q)||t.unit.toLowerCase().includes(Q)){
          tenantHits.push({b,t});
        }
      });
    });
    if(tenantHits.length){
      html += '<div class="cmd-group-label">'+t('cmdGrpTenants')+'</div>';
      tenantHits.slice(0,6).forEach(({b,t})=>{
        const p = getP(t.id,S.month);
        const st = getStatus(t,S.month);
        const idx = cmdItems.length;
        cmdItems.push({action:()=>{goto('bld',b);setTimeout(()=>openPanel(b,t.id),200);closeKbd();}});
        html += `<div class="cmd-item" data-idx="${idx}" onclick="cmdRun(${idx})">
          <div class="cmd-item-icon">🏠</div>
          <div class="cmd-item-label">
            <div class="cmd-item-title">${t.name}</div>
            <div class="cmd-item-sub">${BL[b]} · ${t.unit} · ${TL(t.rent)}</div>
          </div>
          <span class="cmd-item-tag">${st.lbl}</span>
        </div>`;
      });
    }
  }

  // ── Buildings ──
  if(!Q||'gayrettepe karakol tan sokak'.includes(Q)){
    html += '<div class="cmd-group-label">'+t('cmdGrpBuildings')+'</div>';
    BK.forEach(b=>{
      if(Q&&!BL[b].toLowerCase().includes(Q)) return;
      const idx = cmdItems.length;
      const paid = paidTotal(b,S.month), rent = rentTotal(b);
      cmdItems.push({action:()=>{goto('bld',b);closeKbd();}});
      html += `<div class="cmd-item" data-idx="${idx}" onclick="cmdRun(${idx})">
        <div class="cmd-item-icon">🏢</div>
        <div class="cmd-item-label">
          <div class="cmd-item-title">${BL[b]}</div>
          <div class="cmd-item-sub">${(DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0).length} ${t('cmdBldSub')} · ${TL(paid)}/${TL(rent)}</div>
        </div>
        <span class="cmd-item-tag">${rent>0?Math.round(paid/rent*100):0}%</span>
      </div>`;
    });
  }

  if(!cmdItems.length){
    html = '<div class="cmd-empty">'+t('cmdEmpty')+'</div>';
  }

  results.innerHTML = html;
}

function cmdRun(idx){
  const item = cmdItems[idx];
  if(item&&item.action) item.action();
}

function cmdKey(e){
  const items = document.querySelectorAll('#cmd-results .cmd-item');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    cmdSelectedIdx = Math.min(cmdSelectedIdx+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('selected',i===cmdSelectedIdx));
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    cmdSelectedIdx = Math.max(cmdSelectedIdx-1, 0);
    items.forEach((el,i)=>el.classList.toggle('selected',i===cmdSelectedIdx));
  } else if(e.key==='Enter'){
    if(cmdSelectedIdx>=0) cmdRun(cmdSelectedIdx);
    else if(cmdItems.length>0) cmdRun(0);
  } else if(e.key==='Escape'){
    closeKbd();
  }
}

// Global Ctrl+K
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    const overlay = document.getElementById('cmd-overlay');
    if(overlay.classList.contains('open')) closeKbd();
    else openCMD();
  }
  if(e.key==='Escape') closeKbd();
});

// SMART DASHBOARD WIDGETS
// ═══════════════════════════════════════════════════════
function renderSmartWidgets(m){
  const tRent = BK.reduce((s,b)=>s+rentTotal(b),0);
  const tPaid = BK.reduce((s,b)=>s+paidTotal(b,m),0);
  const tExp  = BK.reduce((s,b)=>s+expTotal(b,m),0);
  const tNet  = tPaid - tExp;
  const rate  = tRent>0 ? Math.round(tPaid/tRent*100) : 0;

  // Overdue stats
  let overdueCount=0, overdueAmount=0;
  BK.forEach(b=>(DATA.tenants[b]||[]).filter(t=>t.active&&t.rent>0).forEach(t=>{
    if(isDue(t,m)){overdueCount++;overdueAmount+=t.rent-getP(t.id,m).paid;}
  }));

  // Building performance ranking
  const rankData = BK.map(b=>{
    const r=rentTotal(b), p=paidTotal(b,m);
    return {b, r, p, pct:r>0?p/r:0};
  }).sort((a,b2)=>b2.pct-a.pct);
  const maxR = Math.max(...rankData.map(d=>d.r));

  // Collection trend (last 6 months available)
  const mIdx = ALL_MONTHS.indexOf(m);
  const last6 = ALL_MONTHS.slice(Math.max(0,mIdx-5), mIdx+1);
  const trend6 = last6.map(mo=>({mo, paid:BK.reduce((s,b)=>s+paidTotal(b,mo),0)}));

  // Gauge SVG
  const angle = rate * 1.8; // 0-180 degrees
  const rad = angle * Math.PI/180;
  const cx=60,cy=60,r2=48;
  const x1=cx+r2*Math.cos(Math.PI), y1=cy+r2*Math.sin(Math.PI);
  const x2=cx+r2*Math.cos(Math.PI+rad*0.5*Math.PI/90), y2=cy+r2*Math.sin(Math.PI+rad*0.5*Math.PI/90);
  // Simple arc gauge
  const gaugeSVG=`<svg viewBox="0 0 120 70" style="width:100%;max-width:120px">
    <path d="M12,64 A52,52 0 0,1 108,64" fill="none" stroke="rgba(128,152,188,.22)" stroke-width="8" stroke-linecap="round"/>
    <path d="M12,64 A52,52 0 0,1 108,64" fill="none"
      stroke="${rate>=80?'#10b981':rate>=50?'#f59e0b':'#f43f5e'}" stroke-width="8"
      stroke-linecap="round" stroke-dasharray="${rate*1.634} 999"/>
    <text x="60" y="58" text-anchor="middle" font-size="18" font-weight="700" style="fill:currentColor">${rate}%</text>
  </svg>`;

  // Sparkline SVG
  const vals = trend6.map(t=>t.paid);
  const maxV = Math.max(...vals,1);
  const pts = vals.map((v,i)=>`${i*(100/(Math.max(vals.length-1,1)))},${40-v/maxV*38}`).join(' ');
  const sparkline = vals.length>1?`<svg viewBox="0 0 100 44" style="width:100%;height:44px">
    <polyline points="${pts}" fill="none" stroke="var(--blue-l)" stroke-width="2" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${i*(100/Math.max(vals.length-1,1))}" cy="${40-v/maxV*38}" r="2.5" fill="var(--blue)"/>`).join('')}
  </svg>`:'';

  const rankRows = rankData.map((d,i)=>{
    const colors=['#f59e0b','#7d9ec8','#6b7280'];
    return `<div class="rank-item">
      <div class="rank-num" style="background:rgba(${i===0?'245,158,11':i===1?'125,158,200':'107,114,128'},.15);color:${colors[i]||'var(--i4)'}">${i+1}</div>
      <div style="flex:1;min-width:60px;font-size:12px;color:var(--i2)">${BL[d.b]}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${d.pct*100}%;background:${i===0?'var(--amber)':i===1?'var(--blue)':'var(--i4)'}"></div></div>
      <div class="rank-label" style="font-size:11px;color:var(--i3)">${Math.round(d.pct*100)}%</div>
    </div>`;
  }).join('');

  return `<div class="smart-grid">
    <!-- Collection Rate Gauge -->
    <div class="widget">
      <div class="widget-title">${t('wgtCollRate')}</div>
      <div class="gauge-wrap">
        <div>${gaugeSVG}</div>
        <div>
          <div class="widget-value">${TL(tPaid)}</div>
          <div class="widget-sub">/ ${TL(tRent)} ${t('wgtTarget')}</div>
          <div class="widget-trend ${rate>=80?'trend-up':rate>=50?'trend-flat':'trend-down'}">
            ${rate>=80?'↑':'↓'} ${rate}% ${t('wgtCollected')}
          </div>
        </div>
      </div>
    </div>

    <!-- Net Income -->
    <div class="widget">
      <div class="widget-title">${t('wgtNetIncome')}</div>
      <div class="widget-value ${tNet>=0?'c-green':'c-red'}">${TL(tNet)}</div>
      <div class="widget-sub">${TL(tPaid)} ${t('wgtCollLabel')} − ${TL(tExp)} ${t('wgtExpLabel')}</div>
      <div style="margin-top:12px;display:flex;gap:12px">
        <div style="flex:1;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:13px;font-weight:700;color:var(--emerald-l)">${TL(tPaid)}</div>
          <div style="font-size:10px;color:var(--i4);margin-top:2px">${t('wgtCollLabel')}</div>
        </div>
        <div style="flex:1;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:13px;font-weight:700;color:var(--amber-l)">${TL(tExp)}</div>
          <div style="font-size:10px;color:var(--i4);margin-top:2px">${t('wgtExpLabel')}</div>
        </div>
      </div>
    </div>

    <!-- Overdue Stats -->
    <div class="widget" style="border-color:${overdueCount>0?'rgba(244,63,94,.2)':''}">
      <div class="widget-title">${t('wgtOverdue')}</div>
      <div class="widget-value c-red">${overdueCount}</div>
      <div class="widget-sub">${t('wgtUnit')} · ${TL(overdueAmount)} ${t('wgtTotal')}</div>
      ${overdueCount>0?`<button class="btn btn-danger btn-sm" style="margin-top:10px;width:100%" onclick="goto('wa')">
        ${t('wgtSendReminder')}
      </button>`:`<div class="widget-trend trend-up" style="margin-top:10px">${t('wgtNoOverdue')}</div>`}
    </div>

    <!-- Building Ranking -->
    <div class="widget">
      <div class="widget-title">${t('wgtBldRank')} — ${monthLabel(m)}</div>
      <div class="rank-list">${rankRows}</div>
    </div>

    <!-- Trend Sparkline -->
    ${vals.length>1?`<div class="widget" style="grid-column:span 2">
      <div class="widget-title">${t('wgtTrend').replace('{n}',trend6.length)}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        ${trend6.map(trd=>`<div style="font-size:9px;color:var(--i4);text-align:center">${monthLabelShort(trd.mo.split(' ')[0])}</div>`).join('')}
      </div>
      <div class="sparkline-wrap" style="height:60px">${sparkline}</div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        ${trend6.map(trd=>`<div style="font-size:9px;color:var(--i3);text-align:center">${trd.paid>=1e6?(trd.paid/1e6).toFixed(1)+'M':trd.paid>=1000?Math.round(trd.paid/1000)+'K':trd.paid}</div>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

// ENHANCED WA PAGE — phone management
// ═══════════════════════════════════════════════════════
const _origRenderWA = renderWA;
function renderWA(){
  const m = S.month;
  let sentCount=0,pendingCount=0,noPhoneCount=0;
  const sentKeys = safeArr(DATA.waLog).map(l=>`${l.mo}:${l.bina}:${l.unit}`);

  const overdueList=[];
  BK.forEach(b=>safeTens(b).filter(t=>{
    if(!t.active||t.rent===0) return false;
    return isDue(t,m)||getP(t.id,m).paid<t.rent;
  }).forEach(t=>{
    const phone=(t.phone||'').replace(/\D/g,'');
    const alreadySent=sentKeys.includes(`${m}:${BL[b]}:${t.unit}`);
    if(alreadySent) sentCount++;
    else if(!phone) noPhoneCount++;
    else pendingCount++;
    overdueList.push({b,t,phone,alreadySent});
  }));

  const stats=`<div class="wa-stat-row">
    <div class="wa-stat-card"><div class="wa-stat-num c-red">${overdueList.length}</div><div class="wa-stat-lbl">${t('waTotalDebtors')}</div></div>
    <div class="wa-stat-card"><div class="wa-stat-num c-orange">${pendingCount}</div><div class="wa-stat-lbl">${t('waNotSent')}</div></div>
    <div class="wa-stat-card"><div class="wa-stat-num c-green">${sentCount}</div><div class="wa-stat-lbl">${t('waSent')}</div></div>
    <div class="wa-stat-card"><div class="wa-stat-num c-faint">${noPhoneCount}</div><div class="wa-stat-lbl">${t('waNoPhoneLabel')}</div></div>
  </div>`;

  const cards = overdueList.map(({b,t,phone,alreadySent})=>{
    const p=getP(t.id,m);
    const diff=t.rent-p.paid;
    const msg=buildWAMsg(b,t,m);
    const lastSent = safeArr(DATA.waLog).filter(l=>l.unit===t.unit&&l.bina===BL[b]).slice(-1)[0]||null;
    return `<div class="wa-reminder-card">
      <div class="wa-reminder-hdr">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--i0)">${BL[b]} · ${t.unit} — ${t.name}</div>
          <div style="font-size:11px;color:var(--i4);margin-top:2px">
            ${window.t('waDebtLabel')}: <span class="c-red">${TL(diff)}</span>
            · ${window.t('colPaid')}: <span class="c-orange">${TL(p.paid)}</span>
            · ${window.t('colRent')}: <span class="c-blue">${TL(t.rent)}</span>
          </div>
        </div>
        ${alreadySent?`<span class="wa-sent-badge">${window.t('waLogSent')}</span>`:''}
      </div>
      <!-- Phone management -->
      <div class="wa-phone-row" style="margin-bottom:8px">
        <span style="font-size:11px;color:var(--i4)">📱</span>
        <input class="wa-phone-edit" type="tel" value="${t.phone||''}"
          placeholder="905xxxxxxxxx"
          onchange="updateTenantPhone('${b}','${t.id}',this.value)"
          onblur="updateTenantPhone('${b}','${t.id}',this.value)">
        ${lastSent?`<span class="wa-last-sent">${window.t('waLastSent')} ${lastSent.t.slice(0,10)}</span>`:''}
      </div>
      <div class="wa-msg-box">${msg}</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        ${phone?`<button class="wa-send-btn" onclick="waSendAndLog('${b}','${t.id}','${m}','${phone}',\`${msg.replace(/`/g,"'")}\`)">
          <span>💬</span> ${window.t('waSendBtn')}
        </button>`:
        `<span style="font-size:12px;color:var(--i4)">${window.t('waNoPhoneMsg')}</span>`}
        ${canEdit()?`<button class="btn btn-success btn-sm" onclick="openModal('pay-add','${b}:${t.id}')">${window.t('waEnterPay')}</button>`:''}
      </div>
    </div>`;
  }).join('');

  const logRows = DATA.waLog ? DATA.waLog.slice(-30).reverse().map(l=>
    `<div class="wa-log-item">
      <span class="c-faint">${l.t.slice(0,16)}</span>
      <span style="flex:1">${l.bina} ${l.unit} – ${l.name}</span>
      <span class="c-faint">${l.mo}</span>
    </div>`
  ).join('') : '';

  return monthBar()+`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="font-size:15px;font-weight:700;color:var(--i0);flex:1">${t('waTitle')} — ${monthLabel(m)}</div>
    ${pendingCount>0&&canEdit()?`<button class="btn btn-primary btn-sm" onclick="sendAllWA('${m}')">${t('waSendAll')} (${pendingCount})</button>`:''}
  </div>
  <div class="wa-info-panel" style="background:rgba(37,211,102,.05);border:1px solid rgba(37,211,102,.12);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--i2);line-height:1.6">
    <b style="color:var(--i0)">${t('waAutoNote')}</b> ${t('waAutoDesc')}<br>
    <b>${t('waManualNote')}</b> ${t('waManualDesc')}
  </div>
  ${stats}
  ${overdueList.length?cards:`<div class="empty-state"><span class="empty-state-icon">✅</span><div class="empty-state-text">${monthLabel(m)} ${t('waNoOverdue')}</div></div>`}
  ${logRows?`<div class="sec-hdr" style="margin-top:16px">${t('waRecentSends')}</div>
  <div class="table-card"><div style="padding:4px 8px">${logRows}</div></div>`:''}`;
}

function updateTenantPhone(bname,tid,phone){
  const t=(DATA.tenants[bname]||[]).find(x=>x.id===tid);
  if(!t) return;
  t.phone=phone.trim();
  addHist(`${BL[bname]} ${t.unit} – ${t.name}: telefon güncellendi`);
  saveLocal();
  toast(t('phoneSaved'),'green');
}

function waSendAndLog(bname,tid,mo,phone,msg){
  window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  logWA(bname,tid,mo);
  toast(t('waOpened'),'green');
}

function renderHist(){
  const typeMap={
    'Giriş':    {color:'var(--blue)',icon:'🔐'},
    'ödeme':    {color:'var(--emerald)',icon:'💳'},
    'gider':    {color:'var(--amber)',icon:'💸'},
    'güncellendi':{color:'var(--violet)',icon:'✏️'},
    'eklendi':  {color:'var(--teal)',icon:'➕'},
    'çıkarıldı':{color:'var(--rose)',icon:'🚫'},
    'WA':       {color:'#25d366',icon:'💬'},
    'yedek':    {color:'var(--i3)',icon:'☁️'},
    'bulut':    {color:'var(--blue)',icon:'☁️'},
    'silindi':  {color:'var(--rose)',icon:'🗑'},
  };

  const filterButtons = Object.keys(typeMap).slice(0,6).map(k=>
    `<button class="filter-chip" onclick="filterHistory('${k}',this)">${typeMap[k].icon} ${k}</button>`
  ).join('');

  const entries = DATA.history.slice(0,100).map(h=>{
    const type = Object.keys(typeMap).find(k=>h.desc.toLowerCase().includes(k)) || 'default';
    const info = typeMap[type] || {color:'var(--i4)',icon:'•'};
    return `<div class="tl-entry" style="--tl-color:${info.color}">
      <div class="tl-entry-time">${h.t}</div>
      <div class="tl-entry-text">${info.icon} ${h.desc}</div>
      ${h.user?`<div class="tl-entry-user">by <b>${h.user}</b></div>`:''}
    </div>`;
  }).join('');

  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;flex:1">${t('histEnhTitle')}</div>
    <span style="font-size:12px;color:var(--i4)">${DATA.history.length} ${t('histRecords')}</span>
    <button class="btn btn-ghost btn-sm" onclick="DATA.history=[];addHist('Geçmiş temizlendi');render()">${t('histClear')}</button>
  </div>
  <div class="filter-bar" style="margin-bottom:16px">
    ${filterButtons}
    <button class="filter-chip" id="hist-filter-all" onclick="filterHistory('',this)">${t('filterAll')}</button>
  </div>
  ${DATA.history.length?`<div class="timeline" id="history-timeline">${entries}</div>`:
    '<div class="empty-state"><span class="empty-state-icon">📋</span><div class="empty-state-text">'+t('histEmpty')+'</div></div>'}`;
}

function filterHistory(key,el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const tl = document.getElementById('history-timeline');
  if(!tl) return;
  const entries = tl.querySelectorAll('.tl-entry');
  entries.forEach(e=>{
    if(!key) e.style.display='';
    else e.style.display=e.textContent.toLowerCase().includes(key)?'':'none';
  });
}

function exportExcel(){
  // Using CSV with BOM that Excel opens correctly
  const m = S.month;
  let csv = '\uFEFFBina,Daire,Kat,Kiracı,Telefon,Kira (TL),Ödenen (TL),Fark (TL),Durum,Ödeme Tarihi,Ödeme Şekli,Not,Kontrat Başlangıç,Depozito\n';
  BK.forEach(b=>{
    sortU(DATA.tenants[b]||[]).forEach(t=>{
      const p=getP(t.id,m); const st=getStatus(t,m);
      csv+=`${BL[b]},${t.unit},${t.fl||''},${t.name},${t.phone||''},${t.rent},${p.paid},${p.paid-t.rent},${st.lbl},${p.date||''},${p.sekil||''},${p.notes||''},${t.bas||''},${t.dep||0}\n`;
    });
    csv+=',,,,,,,,,,,,,,\n';
  });
  csv+='\n\nGİDERLER\nBina,Sayaç/No,Tür,Tutar (TL),Tarih,Not\n';
  BK.forEach(b=>{
    ((DATA.expenses[b]||{})[m]||[]).forEach(e=>{
      csv+=`${BL[b]},${e.no||''},${e.tur},${e.tutar},${e.tarih||''},${e.notlar||''}\n`;
    });
  });
  csv+='\n\nMGMT HESABI\nAy,Tahsilat,Gider,Net\n';
  Object.keys(DATA.mgmt).forEach(mo=>{
    const a=DATA.mgmt[mo];
    csv+=`${mo},${a.col||0},${a.exp||0},${a.net||0}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'application/vnd.ms-excel;charset=utf-8'}));
  a.download=`KiraTakip_${m.replace(' ','_')}_${new Date().toISOString().slice(0,10)}.xls`;
  a.click();
  addHist(`Excel export: ${m}`);
  toast('📊 Excel indirildi','green');
}

const _IMPORT_PROFILES_KEY = 'ktp_import_profiles_v1';

const _FIELD_LABELS = {
  date:    'Payment date',
  rent:    'Expected rent',
  payment: 'Paid amount',
  tenant:  'Tenant',
  unit:    'Unit',
  deposit: 'Deposit',
};

function _loadImportProfiles(){
  try{ return JSON.parse(localStorage.getItem(_IMPORT_PROFILES_KEY)||'[]'); }
  catch{ return []; }
}
function _persistImportProfiles(profiles){
  localStorage.setItem(_IMPORT_PROFILES_KEY, JSON.stringify(profiles.slice(0,20)));
}
function _saveImportProfile(profile){
  const profiles = _loadImportProfiles();
  const idx = profiles.findIndex(p=>p.fingerprint===profile.fingerprint);
  if(idx>=0) profiles.splice(idx,1,{...profiles[idx],...profile,lastUsed:new Date().toISOString()});
  else profiles.unshift({...profile,savedAt:new Date().toISOString(),lastUsed:new Date().toISOString()});
  _persistImportProfiles(profiles);
}
function _deleteImportProfile(fp){
  _persistImportProfiles(_loadImportProfiles().filter(p=>p.fingerprint!==fp));
}

function _generateProfileFingerprint(candidate){
  const parts=[];
  if(candidate._ktpVersion) parts.push('v'+candidate._ktpVersion);
  if(candidate._exportedFrom) parts.push(candidate._exportedFrom);
  const blds=Array.isArray(candidate.buildings)?candidate.buildings:[];
  if(blds.length) parts.push(blds.map(b=>b.id||b.name||'').join(',').slice(0,40));
  const tenKeys=Object.keys(candidate.tenants||{}).slice(0,3).join(',');
  if(tenKeys) parts.push(tenKeys);
  return btoa(parts.join('|')).replace(/[^A-Za-z0-9]/g,'').slice(0,16)||'profile_'+Date.now();
}
function _generateProfileTitle(candidate){
  if(candidate._exportedFrom && candidate._exportedFrom!=='v6')
    return (candidate._exportedFrom+' Import').toUpperCase().slice(0,32);
  const blds=Array.isArray(candidate.buildings)?candidate.buildings:[];
  if(blds.length){
    const name=(blds[0].name||blds[0].id||'').trim();
    if(name) return (name+' TEMPLATE').toUpperCase().slice(0,32);
  }
  const tenKey=Object.keys(candidate.tenants||{})[0]||'';
  if(tenKey) return (tenKey+' IMPORT').toUpperCase().slice(0,32);
  return 'Imported Spreadsheet Profile';
}
function _buildProfileMapping(candidate){
  const mapping={};
  const allTens=Object.values(candidate.tenants||{}).reduce((a,v)=>Array.isArray(v)?a.concat(v):a,[]);
  const s=allTens[0]||{};
  if('name' in s||'tenant' in s) mapping.tenant=s.name||s.tenant||'✓';
  if('unit' in s)    mapping.unit   =s.unit||'✓';
  if('rent' in s)    mapping.rent   =s.rent!=null?String(s.rent):'✓';
  if('dep'  in s)    mapping.deposit=s.dep!=null?String(s.dep):'✓';
  if('bas'  in s||'bit' in s) mapping.date='✓';
  const hasPay=Object.keys(candidate.payments||{}).length>0;
  if(hasPay)         mapping.payment='✓';
  return mapping;
}
function _saveImportProfileFromImport(candidate){
  try{
    if(!candidate||typeof candidate!=='object') return;
    const fp       = _generateProfileFingerprint(candidate);
    const mapping  = _buildProfileMapping(candidate);
    const recCount = Object.keys(mapping).length;
    _saveImportProfile({
      fingerprint   : fp,
      displayTitle  : _generateProfileTitle(candidate),
      mapping,
      recognizedCount : recCount,
      totalMappings   : recCount,
      confidence      : recCount>=4?'high':'low',
    });
  }catch(e){ console.error('[profiles]',e); }
}

// SUPABASE CLOUD SYNC v2
// Pure fetch() — no npm package needed.
// Anon/publishable key is safe in frontend (RLS controls access).
// ════════════════════════════════════════════════════════════════

function _readSupabaseInputs() {
  // Always read the live modal fields first.  Earlier builds only checked
  // DATA.cloud, so the Test button showed "URL/Key girilmemiş" even when the
  // user had typed both values but had not saved them yet.
  const urlField = document.getElementById('supa_url');
  const keyField = document.getElementById('supa_key');
  const liveUrl = (urlField && typeof urlField.value === 'string') ? urlField.value : '';
  const liveKey = (keyField && typeof keyField.value === 'string') ? keyField.value : '';
  const url = (liveUrl || DATA.cloud.supabaseUrl || DATA.cloud.url || '')
    .trim()
    .replace(/\/+$/, '');
  const key = (liveKey || DATA.cloud.supabaseKey || DATA.cloud.key || '')
    .trim();
  return { url, key };
}

function _supaMsg(text, color) {
  const msg = document.getElementById('supa-msg');
  if (msg) { msg.textContent = text; msg.style.color = color || 'var(--i3)'; }
}

function _validSupabaseUrl(url) {
  try {
    const u = new URL(url);
    return u.protocol === 'https:' && /\.supabase\.co$/.test(u.hostname);
  } catch { return false; }
}

function _supaHdrs() {
  const key = _readSupabaseInputs().key || DATA.cloud.supabaseKey || '';
  return {
    'Content-Type':  'application/json',
    'apikey':        key,
    'Authorization': 'Bearer ' + key,
    'Prefer':        'resolution=merge-duplicates,return=minimal',
  };
}

async function _testSupabaseConnection({ save=false } = {}) {
  const { url, key } = _readSupabaseInputs();
  if (!url || !key) {
    _supaMsg('❌ Project URL ve API key zorunludur', 'var(--rose-l)');
    toast(t('supaUrlKeyMissing'),'red');
    return { ok:false, error:'missing' };
  }
  if (!_validSupabaseUrl(url)) {
    _supaMsg(t('supaUrlInvalid'), 'var(--rose-l)');
    toast(t('supaUrlKeyMissing'),'red');
    return { ok:false, error:'bad_url' };
  }

  _supaMsg(t('supaTestingConn'), 'var(--i4)');
  try {
    // Use the real REST table used by the app.  If the table is missing we can
    // distinguish schema setup from credential/network problems.
    const r = await fetch(url + '/rest/v1/ktp_sync?select=id&limit=1', {
      headers: { apikey: key, Authorization: 'Bearer ' + key },
      signal: AbortSignal.timeout(10000)
    });
    if (r.status === 401 || r.status === 403) {
      _supaMsg(t('supaKeyInvalid'), 'var(--rose-l)');
      toast('❌ Supabase API key kabul edilmedi', 'red');
      return { ok:false, error:'auth' };
    }
    if (r.status === 404) {
      if (save) {
        DATA.cloud.supabaseUrl = url;
        DATA.cloud.supabaseKey = key;
        DATA.cloud.url = url;
        DATA.cloud.mode = 'supabase';
        DATA.cloud.enabled = false;
        saveLocal();
      }
      _supaMsg('⚠️ Supabase bağlantısı OK; ktp_sync tablosu yok. Supabase SQL Editor’da supabase/schema.sql dosyasını çalıştırın.', 'var(--amber-l)');
      toast('⚠️ Supabase schema eksik', 'orange');
      return { ok:false, error:'schema' };
    }
    if (!r.ok) {
      const body = await r.text().catch(()=>'');
      _supaMsg('⚠️ Supabase HTTP ' + r.status + ': ' + body.slice(0,120), 'var(--amber-l)');
      toast('⚠️ Supabase HTTP ' + r.status, 'orange');
      return { ok:false, error:'http_'+r.status };
    }

    if (save) {
      DATA.cloud.supabaseUrl = url;
      DATA.cloud.supabaseKey = key;
      DATA.cloud.url         = url;
      DATA.cloud.mode        = 'supabase';
      DATA.cloud.enabled     = true;
      DATA.cloud.lastSync    = DATA.cloud.lastSync || new Date().toISOString();
      saveLocal();
      updateCloudUI();
    }
    _supaMsg(t('supaOk'), 'var(--emerald-l)');
    toast(t('supaOkShort'),'green');
    return { ok:true, url, key };
  } catch(e) {
    _supaMsg(t('supaConnErr') + e.message, 'var(--rose-l)');
    toast(t('supaNoResponse'),'red');
    return { ok:false, error:e.message };
  }
}

async function supabaseConnect() {
  const res = await _testSupabaseConnection({ save:true });
  if (res.ok) {
    addHist('Supabase bağlantısı: ' + res.url);
    // Re-render the cloud modal so status/push/pull buttons update immediately.
    const box = document.getElementById('modal-box');
    if (box) box.innerHTML = tplCloud();
  }
}

async function checkSupabaseStatus() {
  await _testSupabaseConnection({ save:false });
}

async function _supaUpsert(table, rows) {
  const url = DATA.cloud.supabaseUrl;
  const key = DATA.cloud.supabaseKey;
  if(!url || !key || !rows.length) return;
  const r = await fetch(url + '/rest/v1/' + table, {
    method:  'POST',
    headers: _supaHdrs(),
    body:    JSON.stringify(rows),
    signal:  AbortSignal.timeout(15000)
  });
  if(!r.ok) {
    const err = await r.text().catch(() => '');
    throw new Error(table + ' upsert failed ' + r.status + ': ' + err.slice(0,120));
  }
}

async function _supaSelect(table, query) {
  const url = DATA.cloud.supabaseUrl;
  const key = DATA.cloud.supabaseKey;
  if(!url || !key) return [];
  const r = await fetch(url + '/rest/v1/' + table + '?' + (query||''), {
    headers: { ..._supaHdrs(), Prefer: 'return=representation' },
    signal:  AbortSignal.timeout(12000)
  });
  if(!r.ok) throw new Error(table + ' select failed ' + r.status);
  return await r.json();
}

// ── 6A-3: Workspace ID — generated once, identifies this customer's Supabase row ─
function _ensureWorkspaceId(){
  if(!DATA.cloud.workspaceId){
    // Existing configured installs get 'ktp_main' so their row key is unchanged.
    // Fresh installs (no cloud URL yet) get a stable UUID for proper isolation.
    DATA.cloud.workspaceId = (DATA.cloud.supabaseUrl || DATA.cloud.url)
      ? 'ktp_main'
      : ((typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : 'ktp-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9));
    saveLocal();
  }
  return DATA.cloud.workspaceId;
}

// ── 6A-1 + 6A-3: Push now sends _exportEnvelope() and uses workspace_id row key ─
async function supabasePush() {
  const url = DATA.cloud.supabaseUrl;
  const key = DATA.cloud.supabaseKey;
  if(!url || !key) { toast(t('supaNotConnected'),'red'); return false; }
  const wsId = _ensureWorkspaceId();
  const current = await _supaSelect('ktp_sync', 'id=eq.'+encodeURIComponent(wsId)+'&select=version');
  if(current && current.length && current[0].version > (DATA.cloud.serverVersion || 0)){
    toast(t('supaServerNewer'),'red');
    return false;
  }
  const record = {
    id:          wsId,
    data_json:   JSON.stringify(_exportEnvelope()),
    version:     (DATA.cloud.serverVersion || 0) + 1,
    updated_at:  new Date().toISOString(),
    app_version: String(KTP_VERSION),
  };
  await _supaUpsert('ktp_sync', [record]);
  DATA.cloud.serverVersion = record.version;
  DATA.cloud.lastSync      = record.updated_at;
  DATA.cloud.enabled       = true;
  DATA.cloud.pendingPush   = false;
  saveLocal();
  return true;
}

// ── 6A-2 + 6A-3: Pull now routes through _importCommit (merge, with rollback) ─
async function supabasePull() {
  const wsId = _ensureWorkspaceId();
  const rows = await _supaSelect('ktp_sync', 'id=eq.'+encodeURIComponent(wsId));
  if(!rows || !rows.length) return false;
  const d = JSON.parse(rows[0].data_json);
  const result = _importCommit(d, 'merge');
  if(!result.ok){
    toast(t('supaPullFailed')+(result.error||t('unknownOp')),'red');
    return false;
  }
  // Update cloud metadata after successful merge (not part of data payload)
  DATA.cloud.serverVersion = rows[0].version;
  DATA.cloud.lastSync      = rows[0].updated_at;
  DATA.cloud.enabled       = true;
  DATA.cloud.lastPullAt    = Date.now();
  saveLocal();
  render(); updateBadges();
  return true;
}

// Override cloudSync to route through Supabase when in supabase mode
(function patchCloudSync(){
  const _orig = cloudSync;
  cloudSync = async function(dir='push'){
    const mode = DATA.cloud.mode || 'supabase';
    if(mode === 'supabase' && DATA.cloud.supabaseUrl){
      S.syncing=true; updateCloudUI();
      try{
        if(dir==='push'){
          const _pushOk = await supabasePush();
          if(_pushOk){
            toast('☁️ Supabase push tamam (v'+DATA.cloud.serverVersion+')','blue');
            addHist('Supabase push v'+DATA.cloud.serverVersion);
          }
        } else {
          const ok = await supabasePull();
          if(ok) { toast('☁️ Supabase pull tamam','blue'); addHist('Supabase pull'); }
          else   { toast(t('supaNoPush'),'blue'); }
        }
      }catch(e){
        toast('❌ Supabase: '+e.message,'red');
        addHist('Supabase hata ('+dir+'): '+e.message);
        if(dir==='push'){ DATA.cloud.pendingPush=true; saveLocal(); }
      }finally{
        S.syncing=false; updateCloudUI();
      }
      return;
    }
    return _orig(dir);
  };
})();

// ── 6B-1: Focus-triggered pull sync ─────────────────────────
// Silently pulls when the window regains focus, if conditions are met.
// Calls supabasePull() directly (not cloudSync) — no toast, no addHist.
// _importCommit merge + rollback behavior is inherited from supabasePull.
let _focusPullActive = false;

async function _focusPull(){
  if(!PRODUCTION_MODE) return;
  if(!DATA.cloud?.enabled) return;
  if(!DATA.cloud?.supabaseUrl || !DATA.cloud?.supabaseKey) return;
  if(S.syncing || _focusPullActive) return;
  if(!currentUser) return;
  if(!navigator.onLine) return;
  _focusPullActive = true;
  try{
    // 6B-2: if a push was deferred due to offline, retry it first (silent)
    if(DATA.cloud?.pendingPush){
      const pushOk = await supabasePush();
      if(!pushOk) return;  // still failing — stay pending, skip pull
      // supabasePush() cleared pendingPush and called saveLocal() on success
    }
    // Normal pull throttled to once per 60s
    if(Date.now() - (DATA.cloud.lastPullAt || 0) < 60000) return;
    await supabasePull();  // lastPullAt and saveLocal handled inside supabasePull
  }catch(e){
    // Silent — focus pull errors must not spam the user
  }finally{
    _focusPullActive = false;
  }
}

window.addEventListener('focus', _focusPull);

// ── 6B-3: Startup pull before first push ────────────────────
// Fires once per app launch immediately after login.
// Merges remote state before the 5-min auto-push can run.
// Borrows _focusPullActive to block concurrent focus pull.
let _startupSyncDone = false;

async function _startupPull(){
  if(_startupSyncDone) return;
  _startupSyncDone = true;  // set before await — prevents re-entry on rapid login
  if(!PRODUCTION_MODE) return;
  if(!DATA.cloud?.enabled) return;
  if(!DATA.cloud?.supabaseUrl || !DATA.cloud?.supabaseKey) return;
  if(S.syncing || _focusPullActive) return;
  if(!navigator.onLine) return;
  _focusPullActive = true;
  try{
    await supabasePull();  // lastPullAt and saveLocal handled inside supabasePull
  }catch(e){
    // Silent — startup pull must not block the user
  }finally{
    _focusPullActive = false;
  }
}

// ── _exportEnvelope ─────────────────────────────────────────────
// Builds the versioned export object. Both exportJSON paths use this.
function _exportEnvelope(){
  return {
    _ktpVersion:  KTP_VERSION,
    _exportedAt:  new Date().toISOString(),
    _exportedFrom:'v6',
    initialized:  DATA.initialized,
    buildings:    DATA.buildings,
    tenants:      DATA.tenants,
    payments:     DATA.payments,
    expenses:     DATA.expenses,
    mgmt:         DATA.mgmt,
    tanNet:       DATA.tanNet,
    gayNet:       DATA.gayNet,
    history:      DATA.history,
    waLog:        DATA.waLog,
    users:        DATA.users.map(function(u){const e=Object.assign({},u);delete e.pin;return e;}),
    settings:     DATA.settings,
    importHistory: Array.isArray(DATA.importHistory) ? DATA.importHistory : [],
    // importSnapshots intentionally excluded: transient rollback data, too large for export
  };
}

// ── _importParse ─────────────────────────────────────────────────
// Returns {ok, candidate, version, errors[]}
// Pure — no side effects, no DATA writes.
function _importParse(raw){
  try{
    if(typeof raw !== 'string' || !raw.trim())
      return {ok:false, candidate:null, version:0, errors:[window.t('errImportEmpty')]};
    const d = JSON.parse(raw);
    if(!d || typeof d !== 'object' || Array.isArray(d))
      return {ok:false, candidate:null, version:0, errors:[window.t('errImportNotObj')]};
    const version = typeof d._ktpVersion === 'number' ? d._ktpVersion : 0; // 0 = v5 / legacy
    return {ok:true, candidate:d, version, errors:[]};
  }catch(e){
    return {ok:false, candidate:null, version:0, errors:[window.t('errImportParse')+e.message]};
  }
}

// ── _importValidate ──────────────────────────────────────────────
// Returns {ok, errors[], warnings[]}
// Pure — no side effects, no DATA writes.
function _importValidate(candidate){
  const errors=[], warnings=[];
  if(!candidate || typeof candidate !== 'object')
    return {ok:false, errors:[window.t('errImportInvalidStruct')], warnings};
  // Fatal: no KTP-recognisable fields
  if(!candidate.tenants && !candidate.payments && !candidate.buildings){
    errors.push(window.t('errImportNotKtp'));
    return {ok:false, errors, warnings};
  }
  // Fatal: future schema version this build cannot handle
  if(typeof candidate._ktpVersion === 'number' && candidate._ktpVersion > KTP_VERSION){
    errors.push(window.t('errImportNewerVer')+candidate._ktpVersion+window.t('errImportNewerVerEnd'));
    return {ok:false, errors, warnings};
  }
  // Recoverable warnings
  if(!candidate.tenants)   warnings.push(window.t('warnImportNoTenants'));
  if(!candidate.payments)  warnings.push(window.t('warnImportNoPayments'));
  if(!candidate.expenses)  warnings.push(window.t('warnImportNoExpenses'));
  if(!candidate.buildings) warnings.push(window.t('warnImportNoBldgs'));
  // Tenant integrity: flag negative rent values (will be zeroed on commit)
  if(candidate.tenants && typeof candidate.tenants === 'object'){
    let badRent=0;
    Object.values(candidate.tenants).forEach(arr=>{
      if(!Array.isArray(arr)) return;
      arr.forEach(tn=>{ if(typeof tn.rent === 'number' && tn.rent < 0) badRent++; });
    });
    if(badRent>0) warnings.push(badRent+window.t('warnImportBadRent'));
  }
  return {ok:errors.length===0, errors, warnings};
}

// ── _importCommit ────────────────────────────────────────────────
// Atomically applies a validated candidate to DATA.
// mode: 'merge' (safe default) | 'overwrite' (destructive, replaces data)
// Returns {ok, error?}
// saveLocal() fires exactly once per call: once on success, once inside rollback.
function _importCommit(candidate, mode){
  const _snapshot = JSON.stringify(DATA); // in-memory rollback point

  function _rollback(errMsg){
    try{
      const recovered = JSON.parse(_snapshot);
      // In-place restore — DATA reference must stay the same object
      Object.keys(DATA).forEach(k=>{ if(!(k in recovered)) delete DATA[k]; });
      Object.keys(recovered).forEach(k=>{ DATA[k]=recovered[k]; });
      syncBuildingConstants();
      try{renderBuildingNav();}catch(e){}
      saveLocal();
    }catch(re){ console.error('[_importCommit] rollback failed',re); }
    return {ok:false, error:errMsg};
  }

  try{

    if(mode==='overwrite'){
      // Replace each field entirely from candidate
      if(candidate.tenants  !==undefined) DATA.tenants  = candidate.tenants;
      if(candidate.payments !==undefined) DATA.payments = candidate.payments;
      if(candidate.expenses !==undefined) DATA.expenses = candidate.expenses;
      if(candidate.alper !== undefined && candidate.mgmt === undefined) candidate.mgmt = candidate.alper; // compat: renamed alper→mgmt in v6.1
      if(candidate.mgmt    !==undefined) DATA.mgmt     = candidate.mgmt;
      if(candidate.tanNet   !==undefined) DATA.tanNet   = candidate.tanNet;
      if(candidate.gayNet   !==undefined) DATA.gayNet   = candidate.gayNet;
      if(candidate.history  !==undefined) DATA.history  = candidate.history;
      if(candidate.waLog    !==undefined) DATA.waLog    = candidate.waLog;
      if(candidate.settings !==undefined) DATA.settings = candidate.settings;
      // users intentionally excluded from import — credentials managed separately via user management UI
      if(Array.isArray(candidate.importHistory)) DATA.importHistory = candidate.importHistory;
      // buildings: use envelope or migrate from v5 tenant keys
      if(candidate.buildings && Array.isArray(candidate.buildings) && candidate.buildings.length){
        DATA.buildings    = candidate.buildings;
        DATA.initialized  = true;
      } else if(candidate.tenants){
        DATA.buildings = Object.keys(candidate.tenants).map((k,i)=>({
          id:k, name:BL[k]||k,
          short:BS[k]||k.replace(/[^A-Z]/g,'').slice(0,3)||String.fromCharCode(65+i),
          color:'', active:true, order:i, metadata:{}
        }));
        DATA.initialized = DATA.buildings.length > 0;
      }

    } else {
      // MERGE: non-destructive accumulation

      // Tenants: per-building-id, dedup by tenant.id
      if(candidate.tenants && typeof candidate.tenants === 'object'){
        Object.keys(candidate.tenants).forEach(bld=>{
          if(!Array.isArray(DATA.tenants[bld])) DATA.tenants[bld]=[];
          (candidate.tenants[bld]||[]).forEach(t=>{
            const safe = (typeof t.rent==='number' && t.rent<0) ? {...t, rent:0} : t;
            const idx = DATA.tenants[bld].findIndex(e=>e.id===safe.id);
            if(idx>=0) DATA.tenants[bld][idx]=safe; else DATA.tenants[bld].push(safe);
          });
        });
      }

      // Payments: keyed by tenantId → month; conservative (keep higher paid)
      if(candidate.payments && typeof candidate.payments === 'object'){
        Object.keys(candidate.payments).forEach(tid=>{
          if(!DATA.payments[tid]) DATA.payments[tid]={};
          Object.keys(candidate.payments[tid]||{}).forEach(mo=>{
            const incoming=candidate.payments[tid][mo];
            const existing=DATA.payments[tid][mo];
            if(!existing||(incoming.paid||0)>(existing.paid||0))
              DATA.payments[tid][mo]=incoming;
          });
        });
      }

      // Expenses: per-building → per-month → array; append non-exact-duplicates
      if(candidate.expenses && typeof candidate.expenses === 'object'){
        Object.keys(candidate.expenses).forEach(bld=>{
          if(!DATA.expenses[bld]) DATA.expenses[bld]={};
          Object.keys(candidate.expenses[bld]||{}).forEach(mo=>{
            if(!Array.isArray(DATA.expenses[bld][mo])) DATA.expenses[bld][mo]=[];
            (candidate.expenses[bld][mo]||[]).forEach(e=>{
              const dup=DATA.expenses[bld][mo].some(x=>
                x.tur===e.tur && x.tutar===e.tutar && x.tarih===e.tarih
              );
              if(!dup) DATA.expenses[bld][mo].push(e);
            });
          });
        });
      }

      // Buildings: add by id, no duplicates
      if(candidate.buildings && Array.isArray(candidate.buildings)){
        const existingIds=new Set((DATA.buildings||[]).map(b=>b.id));
        candidate.buildings.forEach(b=>{
          if(!existingIds.has(b.id))
            DATA.buildings.push({...b, order:DATA.buildings.length});
        });
      } else if(candidate.tenants){
        // v5 migration: add buildings for any tenant-key not already present
        const existingIds=new Set((DATA.buildings||[]).map(b=>b.id));
        Object.keys(candidate.tenants).forEach((k,i)=>{
          if(!existingIds.has(k)){
            DATA.buildings.push({
              id:k, name:BL[k]||k,
              short:BS[k]||k.replace(/[^A-Z]/g,'').slice(0,3)||String.fromCharCode(65+i),
              color:'', active:true, order:DATA.buildings.length, metadata:{}
            });
          }
        });
      }

      // mgmt/tanNet/gayNet: month-key merge (incoming wins per month — recalced by autoRecalc anyway)
      if(candidate.alper !== undefined && candidate.mgmt === undefined) candidate.mgmt = candidate.alper; // compat: renamed alper→mgmt in v6.1
      if(candidate.mgmt)  Object.assign(DATA.mgmt,  candidate.mgmt);
      if(candidate.tanNet) Object.assign(DATA.tanNet, candidate.tanNet);
      if(candidate.gayNet) Object.assign(DATA.gayNet, candidate.gayNet);

      // history: prepend incoming, cap at 200
      if(Array.isArray(candidate.history))
        DATA.history = candidate.history.concat(DATA.history||[]).slice(0,200);

      // waLog: prepend incoming, cap at 500
      if(Array.isArray(candidate.waLog))
        DATA.waLog = candidate.waLog.concat(DATA.waLog||[]).slice(0,500);

      // settings: existing values win (preserve user config)
      if(candidate.settings && typeof candidate.settings === 'object')
        DATA.settings = {...candidate.settings, ...DATA.settings};

      // importHistory: prepend incoming entries not already present (deduplicate by id), cap at 100
      if(Array.isArray(candidate.importHistory)){
        const existingIds=new Set((DATA.importHistory||[]).map(h=>h.id));
        const incoming=candidate.importHistory.filter(h=>!existingIds.has(h.id));
        DATA.importHistory=(incoming.concat(DATA.importHistory||[])).slice(0,100);
      }

      // initialized: never cleared in merge mode; only ever set to true
      if(candidate.initialized===true || (DATA.buildings||[]).some(b=>b.active))
        DATA.initialized = true;

      // users: NOT merged — security boundary; only overwrite mode may replace
    }

    // Mandatory post-commit sequence — order is load-bearing
    syncBuildingConstants();
    renderBuildingNav();
    try{ALL_MONTHS=buildAllMonths();}catch(e){}  // rebuild month range to cover imported data
    autoRecalc();
    saveLocal(); // ← single persistence call per successful commit

    // Retain snapshot for 30-min undo window
    window._lastImportSnapshot = _snapshot;
    window._lastImportTime     = Date.now();

    return {ok:true};

  }catch(e){
    console.error('[_importCommit] error — rolling back', e);
    return _rollback(e.message);
  }
}

// ── Import Wizard (Phase 5) ─────────────────────────────────
let _importCandidate = null;
let _importWizardOpts = {};

async function importWizard(inp, opts){
  opts = opts || {};
  _importWizardOpts = opts;
  if(isElectron){
    let result;
    try{ result = await window.electron.importJSON(); }
    catch(e){ toast('❌ '+t('errFileOp')+e.message,'red'); return; }
    if(!result||!result.ok){ if(!result||!result.canceled) toast('❌ '+(result&&result.error||t('errFileRead')),'red'); return; }
    _importWizardProcess(result.data, opts);
  } else if(inp && inp.files && inp.files[0]){
    const f=inp.files[0];
    const r=new FileReader();
    r.onload=e=>_importWizardProcess(e.target.result, opts);
    r.readAsText(f);
  } else if(opts.fromOnboarding){
    const picker=document.createElement('input');
    picker.type='file'; picker.accept='.json';
    picker.onchange=()=>{
      if(!picker.files||!picker.files[0]) return;
      const r=new FileReader();
      r.onload=e=>_importWizardProcess(e.target.result, opts);
      r.readAsText(picker.files[0]);
    };
    picker.click();
  }
}

function _importWizardProcess(rawStr, opts){
  const parsed=_importParse(rawStr);
  if(!parsed.ok){
    const msg=parsed.errors.join(', ');
    if(opts.fromOnboarding){
      const err=document.getElementById('ob-err2');
      if(err){ err.textContent='❌ '+msg; setTimeout(()=>{ err.textContent=''; },4000); }
    } else { toast('❌ '+msg,'red'); }
    return;
  }
  const validated=_importValidate(parsed.candidate);
  if(!validated.ok){
    const msg=validated.errors.join('; ');
    if(opts.fromOnboarding){
      const err=document.getElementById('ob-err2');
      if(err){ err.textContent='❌ '+msg; setTimeout(()=>{ err.textContent=''; },4000); }
    } else { toast('❌ '+msg,'red'); }
    return;
  }
  _importCandidate=parsed.candidate;
  _importShowPreview(parsed.candidate, parsed.version, validated.warnings, opts);
}

        <div><div style="font-size:11px;color:var(--i4)">${t('wizPayLabel')}</div>
             <div style="font-weight:600;color:var(--i1)">${payCount}</div></div>
      </div>
      ${warnings.length?`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
          border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:var(--amber-l)">
          ⚠️ ${warnings.join('<br>⚠️ ')}</div>`:''}
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--i3);margin-bottom:8px">${t('wizModeLabel')}</div>
        ${opts.fromOnboarding
          ?`<input type="hidden" id="wiz-mode-hidden" value="overwrite">
            <div style="font-size:12px;color:var(--i4)">${t('wizOnboardingNote')}</div>`
          :`<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer">
              <input type="radio" name="wiz-mode" value="merge" checked>
              <span style="font-size:13px">${t('wizMergeLbl')} <span style="color:var(--i4);font-size:11px">— ${t('wizMergeDesc')}</span></span>

              <input type="radio" name="wiz-mode" value="overwrite">
              <span style="font-size:13px">${t('wizOverwriteLbl')} <span style="color:var(--rose-l);font-size:11px">— ${t('wizOverwriteDesc')}</span></span>
            </label>`}
      </div>

        <button class="btn btn-primary" style="flex:2" onclick="_importWizardConfirm()">${t('wizImportBtn')}</button>
      </div>
    </div>
  `;
  overlay.classList.add('open');
}

function _importWizardCancel(){
  _importCandidate=null; _importWizardOpts={};
  closeMod();
}

function _importWizardConfirm(){
  if(!_importCandidate){ closeMod(); return; }
  const opts=_importWizardOpts;
  let mode='merge';
  const hidden=document.getElementById('wiz-mode-hidden');
  if(hidden){ mode=hidden.value; }
  else { const r=document.querySelector('input[name="wiz-mode"]:checked'); if(r) mode=r.value; }
  const result=_importCommit(_importCandidate, mode);
  if(result.ok) _saveImportProfileFromImport(_importCandidate);
  _importCandidate=null; _importWizardOpts={};
  closeMod();
  if(!result.ok){
    toast(t('wizImportFailed')+(result.error||t('unknownOp')),'red');
    renderBuildingNav();
    return;
  }
  if(opts.fromOnboarding){
    _obPin='';
    const obScr=document.getElementById('ob-screen');
    if(obScr) obScr.style.display='none';
    renderLogin();
    toast(t('wizImportDone'),'green');
  } else {
    ALL_MONTHS=buildAllMonths();
    render(); updateBadges();
    toast(t('wizImportDoneMode')+' ('+mode+')','green');
  }
}

// ── Enhanced importJSON: use native Open dialog in Electron ─
const _origImportJSON_renderer = typeof importJSON === 'function' ? importJSON : null;
function importJSON(inp){
  if(PRODUCTION_MODE){ importWizard(inp); return; }
  if(!isElectron){ if(_origImportJSON_renderer) _origImportJSON_renderer(inp); return; }
  window.electron.importJSON().then(result => {
    if(!result.ok){ if(!result.error) return; toast('❌ ' + result.error,'red'); return; }
    try{
      const d = JSON.parse(result.data);
      // Schema validation before committing
      if(!d||typeof d!=='object'){toast('❌ '+t('errRestoreNotObj'),'red');return;}
      if(!d.tenants&&!d.payments&&!d.users){toast('❌ '+t('errRestoreNotKtp'),'red');return;}
      const miss=[];
      if(!d.tenants)miss.push(t('restoreMissTenants'));if(!d.payments)miss.push(t('restoreMissPayments'));if(!d.expenses)miss.push(t('restoreMissExpenses'));

function _licenseMsg(reason, lang) {
  const TR = {
    valid:                   'Lisans: Aktif',
    no_license:              '⚠ Lisans yüklü değil',
    read_error:              '⚠ Lisans dosyası okunamadı',
    invalid_json:            '⚠ Lisans dosyası geçersiz',
    invalid_format:          '⚠ Lisans formatı hatalı',
    unsupported_schema:      '⚠ Lisans sürümü desteklenmiyor',
    invalid_app:             '❌ Bu lisans uygulamaya ait değil',
    fingerprint_unavailable: '⚠ Makine kimliği alınamadı',
    wrong_machine:           '❌ Bu lisans başka makineye ait',
    invalid_signature:       '❌ Lisans imzası geçersiz',
    expired:                 '❌ Lisans süresi doldu',
    verifier_error:          '⚠ Lisans doğrulanamadı',
  };
  const EN = {
    valid:                   'License: Active',
    no_license:              '⚠ No license installed',
    read_error:              '⚠ License file unreadable',
    invalid_json:            '⚠ Invalid license file',
    invalid_format:          '⚠ License format error',
    unsupported_schema:      '⚠ License version not supported',
    invalid_app:             '❌ License is not for this app',
    fingerprint_unavailable: '⚠ Machine ID unavailable',
    wrong_machine:           '❌ License bound to another machine',
    invalid_signature:       '❌ License signature invalid',
    expired:                 '❌ License has expired',
    verifier_error:          '⚠ License verification failed',
  };
  const map = (lang === 'en') ? EN : TR;
  return map[reason] || (lang === 'en' ? '⚠ License status unknown' : '⚠ Lisans durumu bilinmiyor');
}

function _renderLicenseStatus() {
  const el = document.getElementById('lic-status');
  if (!el || !licenseStatus) return;
  const lang = (DATA && DATA.settings && DATA.settings.lang) || 'tr';
  if (licenseStatus.ok) {
    const lic = licenseStatus.license;
    const dateStr = lic.perpetual
      ? (lang === 'en' ? 'Perpetual' : 'Süresiz')
      : (lang === 'en' ? 'Expires: ' + String(lic.expiresAt || '').slice(0, 10)
                       : 'Bitiş: '   + String(lic.expiresAt || '').slice(0, 10));
    el.innerHTML =
      '<span style="color:var(--emerald-l)">✓</span> ' +
      (lang === 'en' ? 'License: Active' : 'Lisans: Aktif') +
      '<br><span style="font-size:9.5px;color:var(--i4)">' + dateStr + '</span>';
    el.style.background  = 'var(--ok-bg)';
    el.style.borderColor = 'var(--ok-bd)';
    el.style.color       = 'var(--emerald-l)';
  } else {
    const isCritical = licenseStatus.reason === 'wrong_machine' ||
                       licenseStatus.reason === 'invalid_signature' ||
                       licenseStatus.reason === 'expired';
    el.textContent       = _licenseMsg(licenseStatus.reason, lang);
    el.style.background  = isCritical ? 'var(--err-bg)'  : 'var(--warn-bg)';
    el.style.borderColor = isCritical ? 'var(--err-bd)'  : 'var(--warn-bd)';
    el.style.color       = isCritical ? 'var(--rose-l)'  : 'var(--amber-l)';
  }
  el.style.display = '';
}

async function checkLicenseStatus() {
  if (!window.electron?.checkLicense) return;
  if (licenseChecked) return;
  licenseChecked = true;
  try {
    const result = await window.electron.checkLicense();
    licenseStatus = result;
    _renderLicenseStatus();
    const lang = (DATA && DATA.settings && DATA.settings.lang) || 'tr';
    if (!result.ok) {
      const msg = _licenseMsg(result.reason, lang);
      const isCritical = result.reason === 'wrong_machine' ||
                         result.reason === 'invalid_signature' ||
                         result.reason === 'expired';
      toast(msg, isCritical ? 'red' : 'orange');
    }
  } catch (e) {
    console.warn('[license] check error', e && e.message);
  }
}

(function(){
  const modalCss = document.createElement('style');
  modalCss.textContent = `
    #modal-overlay{z-index:10000;pointer-events:auto;}
    #modal-overlay.open{display:flex!important;}

  document.head.appendChild(modalCss);

  function captureScroll(){
    const c=document.getElementById('content');
    return {x:window.scrollX||0,y:window.scrollY||0,cx:c?c.scrollLeft:0,cy:c?c.scrollTop:0};
  }
  function restoreScroll(pos){
    if(!pos) return;
    const run=()=>{
      try{ window.scrollTo(pos.x,pos.y); }catch{}
      const c=document.getElementById('content');
      if(c){ c.scrollLeft=pos.cx; c.scrollTop=pos.cy; }
    };
    requestAnimationFrame(()=>{ run(); setTimeout(run,0); setTimeout(run,80); });
  }
  function renderKeepScroll(){ const pos=captureScroll(); render(); restoreScroll(pos); }

  const _openModFix=openMod;

    if(overlay) overlay.style.pointerEvents='auto';
    if(md){
      md.style.pointerEvents='auto';
      md.addEventListener('click',e=>e.stopPropagation(),{once:true});
    }
    setTimeout(()=>{

  window.saveExp_=function(eb,emo,eidx){
    const pos=captureScroll();
    const originalB=eb||document.getElementById('e_b')?.value;
    const originalMo=emo||document.getElementById('e_mo')?.value;
    const formB=document.getElementById('e_b')?.value || originalB;
    const formMo=document.getElementById('e_mo')?.value || originalMo;
    const tur=(document.getElementById('e_tur')?.value||'').trim().toUpperCase();
    const no=(document.getElementById('e_no')?.value||'').trim();
    const tutar=parseFloat(document.getElementById('e_amt')?.value)||0;
    const tarih=document.getElementById('e_dt')?.value||'';
    const notlar=document.getElementById('e_nt')?.value||'';
    if(!formB||!formMo||!tur) return;
    _lastExpTur=tur;
    if(!DATA.expenses[formB]) DATA.expenses[formB]={};
    if(!DATA.expenses[formB][formMo]) DATA.expenses[formB][formMo]=[];
    const entry={tur,no,tutar,tarih,notlar};
    if(eidx!==undefined && eidx!==null && DATA.expenses[originalB]?.[originalMo]?.[eidx]){
      // If building/month was changed in the edit form, move the existing row instead of leaving a duplicate behind.
      if(originalB!==formB || originalMo!==formMo){
        DATA.expenses[originalB][originalMo].splice(eidx,1);
        DATA.expenses[formB][formMo].push(entry);
      }else{
        DATA.expenses[formB][formMo].splice(eidx,1,entry);
      }
    }else{
      DATA.expenses[formB][formMo].push(entry);
    }
    addHist(`${BL[formB]} gider ${eidx!==undefined?'güncellendi':'eklendi'}: ${tur} ${TL(tutar)} (${formMo})`);

/* ═══════════════════════════════════════════════════════
   HOTFIX v5.1.9b — right-click context menu for form fields
═══════════════════════════════════════════════════════ */
(function(){
  var _cm=null;
  function _closeCM(){if(_cm){_cm.remove();_cm=null;}}

  document.addEventListener('contextmenu',function(e){
    const t=e.target;
    const isField=t.tagName==='INPUT'||t.tagName==='TEXTAREA'||
                  t.tagName==='SELECT'||t.isContentEditable;
    if(!isField){_closeCM();return;}
    e.preventDefault();
    _closeCM();

    const applyPaste=function(text){
      if(typeof text!=='string')return;
      t.focus();
      if(t.isContentEditable){
        document.execCommand('insertText',false,text);
      }else{
        const s=t.selectionStart??0,e2=t.selectionEnd??t.value.length;
        t.value=t.value.slice(0,s)+text+t.value.slice(e2);
        t.selectionStart=t.selectionEnd=s+text.length;
        t.dispatchEvent(new Event('input',{bubbles:true}));
        t.dispatchEvent(new Event('change',{bubbles:true}));
      }
    };

    const items=[
      [window.t('ctxCut'),       function(){t.focus();document.execCommand('cut');}],
      [window.t('ctxCopy'),      function(){t.focus();document.execCommand('copy');}],
      [window.t('ctxPaste'),     function(){
        t.focus();
        if(typeof window.electron!=='undefined'&&window.electron.readClipboard){
          window.electron.readClipboard().then(applyPaste).catch(function(){});
        }else if(navigator.clipboard&&navigator.clipboard.readText){
          navigator.clipboard.readText().then(applyPaste).catch(function(){});
        }
      }],
      [window.t('ctxSelectAll'), function(){t.focus();document.execCommand('selectAll');}],
    ];

    const _cmLight=document.documentElement.getAttribute('data-theme')==='light';
    const menu=document.createElement('div');
    menu.style.cssText='position:fixed;z-index:99999;background:'+(_cmLight?'rgba(240,246,255,.98)':'#0f1e38')+';'+
      'border:1px solid '+(_cmLight?'rgba(30,50,100,.18)':'rgba(255,255,255,.13)')+';border-radius:8px;padding:4px;'+
      'box-shadow:0 8px 28px rgba(0,0,0,.'+(_cmLight?'18':'65')+');min-width:160px;'+
      'font-family:var(--sans,system-ui,-apple-system,sans-serif);font-size:12px;';

    items.forEach(function(pair){
      const btn=document.createElement('button');
      btn.textContent=pair[0];
      btn.style.cssText='display:block;width:100%;padding:7px 12px;background:transparent;'+
        'border:none;color:'+(_cmLight?'#1e3a6a':'#e8edf8')+';cursor:pointer;text-align:left;border-radius:5px;'+
        'font-size:12px;font-family:inherit;line-height:1.4;';
      btn.addEventListener('mouseover',function(){btn.style.background=_cmLight?'rgba(37,99,235,.1)':'rgba(59,130,246,.15)';});
      btn.addEventListener('mouseout', function(){btn.style.background='transparent';});
      btn.addEventListener('mousedown',function(ev){ev.preventDefault();});
      btn.addEventListener('click',function(){pair[1]();_closeCM();});
      menu.appendChild(btn);
    });

    document.body.appendChild(menu);
    var x=e.clientX,y=e.clientY;
    var r=menu.getBoundingClientRect();
    if(x+r.width >window.innerWidth) x=window.innerWidth -r.width -4;
    if(y+r.height>window.innerHeight)y=window.innerHeight-r.height-4;
    menu.style.left=x+'px';menu.style.top=y+'px';
    _cm=menu;
  });

  document.addEventListener('click',_closeCM);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')_closeCM();});
})();

  function _rentForType(type){
    if(type==='ofis')  return _rng(15,50)*1000;
    if(type==='plaza') return _rng(20,80)*1000;
    if(type==='site')  return _rng(10,22)*1000;
    return _rng(8,28)*1000; // konut
  }

  var _seedBase=0; // set by _execSeed to index of 'Ocak 2025' in ALL_MONTHS

  // Month index → {year:string, monthNum:int, moStr:string}
  function _moInfo(idx){
    var moStr=ALL_MONTHS[idx];
    if(!moStr) moStr=ALL_MONTHS[ALL_MONTHS.length-1]||'Ocak 2025';
    var parts=moStr.split(' ');
    var mn=_MONTHS_TR.indexOf(parts[0])+1;
    return {year:parts[1],monthNum:mn,moStr:moStr};
  }

  // Generate payments for one tenant across months [startIdx .. 23] (relative to _seedBase)
  function _genPays(rent, startIdx){
    var pays={};
    var curIdx=ALL_MONTHS.indexOf(S.month);
    for(var i=_seedBase+startIdx;i<_seedBase+24&&i<ALL_MONTHS.length;i++){
      var mi=_moInfo(i);
      var r=Math.random();
      var paid=0,date='',sekil='',notes='';
      if(i<curIdx-1){
        // past months: 68% full, 12% partial, 15% zero, 5% late-full
        if     (r<0.68){paid=rent;date=_iso(mi.year,mi.monthNum,_rng(1,12));sekil=_pick(_SEKILLAR);}
        else if(r<0.80){paid=Math.round(rent*_pick([0.25,0.5,0.75]));date=_iso(mi.year,mi.monthNum,_rng(8,22));sekil=_pick(_SEKILLAR);notes='Kısmi ödeme';}
        else if(r<0.95){paid=0;} // overdue
        else           {paid=rent;date=_iso(mi.year,mi.monthNum,_rng(20,28));sekil=_pick(_SEKILLAR);notes='Geç ödeme';}
      } else if(i===curIdx){
        // current month: 38% already paid
        if(r<0.38){paid=rent;date=_iso(mi.year,mi.monthNum,_rng(1,8));sekil=_pick(_SEKILLAR);}
      }
      // Always write the slot for past months so history panel shows them
      if(i<=curIdx){
        pays[mi.moStr]={paid:paid,date:date,sekil:sekil,notes:notes};
      }
    }
    return pays;
  }

  // Generate expenses for one building across 24 months (relative to _seedBase)
  function _genExps(bType){
    var exps={};
    for(var i=_seedBase;i<_seedBase+24&&i<ALL_MONTHS.length;i++){
      var mi=_moInfo(i);
      var isWinter=(mi.monthNum>=10||mi.monthNum<=3);
      var isHighMo=(Math.random()<0.10);
      var entries=[];
      // guaranteed: electric + one more
      entries.push({tur:'ELEKTRİK',no:'',
        tutar:_rng(1200,7000)*(isHighMo?_rng(2,3):1),
        tarih:_iso(mi.year,mi.monthNum,_rng(5,20)),notlar:''});
      // 70% chance of water
      if(Math.random()<0.70){
        entries.push({tur:'SU',no:'',tutar:_rng(400,2500),
          tarih:_iso(mi.year,mi.monthNum,_rng(5,20)),notlar:''});
      }
      // winter: gas
      if(isWinter&&Math.random()<0.75){
        entries.push({tur:'DOĞALGAZ',no:'',tutar:_rng(1500,7000),
          tarih:_iso(mi.year,mi.monthNum,_rng(5,20)),notlar:''});
      }
      // 40% chance of a misc expense
      if(Math.random()<0.40){
        var misc=_pick(_EXP_CATS.slice(3));
        entries.push({tur:misc,no:'',tutar:_rng(500,6000),
          tarih:_iso(mi.year,mi.monthNum,_rng(5,25)),notlar:''});
      }
      exps[mi.moStr]=entries;
    }
    return exps;
  }

  function _execSeed(){
    try{
      // Anchor seed data to Ocak 2025 window; if not in range, use 16 months before current
      _seedBase=ALL_MONTHS.indexOf('Ocak 2025');
      if(_seedBase<0) _seedBase=Math.max(0,ALL_MONTHS.indexOf(S.month)-16);
      var buildings=[];
      var tenants={};
      var payments={};
      var expenses={};
      var history=[];
      var tenantCount=0;
      var expCount=0;

      _BLDG_DEFS.forEach(function(bdef,i){
        var isArchived=!!bdef.archived;
        buildings.push({id:bdef.id,name:bdef.name,short:bdef.short,color:'',
          active:!isArchived,order:i,metadata:{type:bdef.type}});

        var bTens=[];
        for(var u=0;u<bdef.unitCount;u++){
          var uNum=u+1;
          var unitLbl=(bdef.type==='ofis')?
            'O'+String(uNum).padStart(3,'0') :
            'D'+String(uNum).padStart(2,'0');
          var flLbl=_FLOOR_LBL[Math.min(Math.floor(u/3),_FLOOR_LBL.length-1)];
          var tid=bdef.id+'_T'+String(uNum).padStart(3,'0');

          if(isArchived){
            // archived building: historical inactive tenants
            bTens.push({id:tid,unit:unitLbl,fl:flLbl,name:_name(),
              rent:_rng(8,20)*1000,dep:0,bas:'2023-01-01',bit:'2025-01-01',
              gun:1,sekil:'Banka',active:false,notes:'',phone:_fakePhone()});
            continue;
          }

          var isVacant=(Math.random()<0.10);
          if(isVacant){
            // vacant slot: active:false, rent:0
            bTens.push({id:tid,unit:unitLbl,fl:flLbl,name:'',
              rent:0,dep:0,bas:'',bit:'',gun:1,sekil:'',
              active:false,notes:'',phone:''});
            continue;
          }

          var rent=_rentForType(bdef.type);
          var startOff=_rng(0,12); // relative offset from _seedBase
          var startMi=_moInfo(_seedBase+startOff);
          var hasEnd=(Math.random()<0.12);
          var bitDate=hasEnd?_iso('2026',_rng(6,12),'01'):'';

          bTens.push({id:tid,unit:unitLbl,fl:flLbl,name:_name(),
            rent:rent,dep:rent,bas:_iso(startMi.year,startMi.monthNum,'01'),bit:bitDate,
            gun:_rng(1,10),sekil:_pick(_SEKILLAR),active:true,notes:'',phone:_fakePhone()});
          payments[tid]=_genPays(rent,startOff);
          tenantCount++;
        }
        tenants[bdef.id]=bTens;

        if(!isArchived){
          expenses[bdef.id]=_genExps(bdef.type);
          Object.values(expenses[bdef.id]).forEach(function(arr){expCount+=arr.length;});
        }
      });

      // Realistic operational history (80 entries, spread over 6 months)
      var _histOps=[
        'Ödeme kaydedildi','Kiracı bilgisi güncellendi','Gider eklendi',
        'Yedek alındı','Ayarlar güncellendi','Bina eklendi',
        'WA mesajı gönderildi','Rapor oluşturuldu','İçe aktarma yapıldı','Geri yükleme yapıldı'];
      var _histUsers=['Yönetici','Müdür','Sistem'];
      for(var h=0;h<80;h++){
        var daysAgo=_rng(0,180);
        var d=new Date(Date.now()-daysAgo*864e5);
        history.push({
          t:d.toLocaleString('tr-TR'),
          desc:_pick(_histOps)+' — '+_pick(_BLDG_DEFS).name,
          user:_pick(_histUsers)
        });
      }
      history.sort(function(a,b){return new Date(b.t)-new Date(a.t);});

      // Patch DATA — preserve cloud/settings/users/waLog/alper/tanNet/gayNet
      DATA.buildings=buildings;
      DATA.tenants=tenants;
      DATA.payments=payments;
      DATA.expenses=expenses;
      DATA.history=history;
      DATA.initialized=true;

      syncBuildingConstants();
      saveLocal();
      S.page='dash';
      S.bld=BK[0]||null;
      S.filter='';
      S.search='';
      render();
      updateBadges();
      renderBuildingNav();
      toast('✓ Demo veri oluşturuldu: '+buildings.length+' bina · '+tenantCount+' kiracı · 24 ay · '+expCount+' gider','green');
      addHist('Demo veri oluşturuldu: '+buildings.length+' bina, '+tenantCount+' kiracı, '+expCount+' gider');
    }catch(err){
      console.error('[seedDemoData]',err);
      toast('⚠ Demo veri hatası: '+err.message,'red');
    }
  }

// ── CSV parser ────────────────────────────────────────
function _csvLine(line,delim){
  var out=[],cur='',q=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===delim&&!q){out.push(cur.trim());cur='';}
    else cur+=c;
  }
  out.push(cur.trim());return out;
}
function _parseCsv(text){
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1); // strip UTF-8 BOM
  var first=text.split(/\r?\n/)[0]||'';
  var delim=(first.split(';').length>first.split(',').length)?';':',';
  return text.split(/\r?\n/)
    .map(function(l){return _csvLine(l,delim);})
    .filter(function(r){return r.length>0&&r.some(function(c){return c!=='';});});
}

// ── XLSX parser (requires SheetJS global) ─────────────
function _parseXlsx(buf){
  if(typeof XLSX==='undefined') throw new Error('XLSX kütüphanesi yüklenemedi');
  return XLSX.read(buf,{type:'array',cellDates:true,raw:false});
}
function _sheetToRows(wb,name){
