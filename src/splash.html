<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kira Takip Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#060d1a;
  overflow:hidden;
  font-family:'DM Sans',-apple-system,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

.sp{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse 100% 80% at 50% 55%,#0d1e40 0%,#060d1a 68%);
  opacity:0;
  transition:opacity 0.6s cubic-bezier(.4,0,.2,1);
}
.sp.visible  {opacity:1;}
.sp.fade-out {opacity:0;}

/* ── Logo block ─────────────────────────────────── */
.logo-wrap{
  position:relative;
  width:100px;height:100px;
  margin-bottom:22px;
  animation:scaleIn 0.5s cubic-bezier(.34,1.5,.64,1) 0.05s both;
}

.glow-ring{
  position:absolute;inset:-10px;
  border-radius:36px;
  box-shadow:0 0 0 1px rgba(59,130,246,0.12),
             0 0 28px rgba(59,130,246,0.22),
             0 0 56px rgba(59,130,246,0.09);
  animation:breathe 2.6s ease-in-out infinite;
}

.logo-card{
  position:absolute;inset:0;
  border-radius:26px;
  background:linear-gradient(150deg,#0f1e38 0%,#07101f 100%);
  border:1px solid rgba(59,130,246,0.22);
  box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,
             0 12px 40px rgba(0,0,0,0.55);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:5px;
}

.logo-card svg{
  width:50px;height:50px;
  filter:drop-shadow(0 0 10px rgba(59,130,246,0.65));
}

.logo-lira{
  font-size:10px;font-weight:700;
  color:#60a5fa;
  letter-spacing:1.5px;
  text-shadow:0 0 10px rgba(59,130,246,0.8);
}

/* ── Text ───────────────────────────────────────── */
.title{
  font-size:22px;font-weight:700;
  color:#fff;letter-spacing:-0.5px;
  text-shadow:0 0 40px rgba(59,130,246,0.45),
              0 0 80px rgba(59,130,246,0.18);
  animation:fadeUp 0.45s cubic-bezier(.34,1.2,.64,1) 0.18s both;
}

.sub{
  font-size:10.5px;font-weight:400;
  color:rgba(255,255,255,0.3);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:5px;margin-bottom:26px;
  animation:fadeUp 0.4s ease 0.28s both;
}

/* ── Progress bar ───────────────────────────────── */
.track{
  width:140px;height:2px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;
  animation:fadeUp 0.35s ease 0.32s both;
}
.bar{
  height:100%;width:0%;
  border-radius:2px;
  background:linear-gradient(90deg,#3b82f6,#818cf8);
  box-shadow:0 0 8px rgba(59,130,246,0.75);
  transition:width 1s cubic-bezier(.4,0,.2,1);
}

/* ── Keyframes ──────────────────────────────────── */
@keyframes scaleIn{
  from{transform:scale(0.72);opacity:0}
  to  {transform:scale(1);   opacity:1}
}
@keyframes fadeUp{
  from{transform:translateY(9px);opacity:0}
  to  {transform:translateY(0);  opacity:1}
}
@keyframes breathe{
  0%,100%{box-shadow:0 0 0 1px rgba(59,130,246,0.10),0 0 22px rgba(59,130,246,0.18),0 0 44px rgba(59,130,246,0.07);}
  50%    {box-shadow:0 0 0 1px rgba(59,130,246,0.22),0 0 38px rgba(59,130,246,0.38),0 0 76px rgba(59,130,246,0.14);}
}
</style>
</head>
<body>
<div class="sp" id="sp">

  <div class="logo-wrap">
    <div class="glow-ring"></div>
    <div class="logo-card">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,5 7,17 41,17" fill="rgba(255,255,255,0.88)"/>
        <rect x="9"  y="17" width="30" height="22" rx="2.5"
              fill="rgba(59,130,246,0.16)" stroke="rgba(59,130,246,0.55)" stroke-width="1.1"/>
        <rect x="20" y="28" width="8"  height="11" rx="1.5" fill="rgba(59,130,246,0.55)"/>
        <rect x="10" y="21" width="7"  height="6"  rx="1"   fill="rgba(147,197,253,0.6)"/>
        <rect x="31" y="21" width="7"  height="6"  rx="1"   fill="rgba(147,197,253,0.6)"/>
        <rect x="10" y="30" width="7"  height="5"  rx="1"   fill="rgba(147,197,253,0.38)"/>
        <rect x="31" y="30" width="7"  height="5"  rx="1"   fill="rgba(147,197,253,0.38)"/>
      </svg>
      <span class="logo-lira">₺ KTP</span>
    </div>
  </div>

  <div class="title">Kira Takip Pro</div>
  <div class="sub">Emlak Yönetim Sistemi hazırlanıyor…</div>
  <div class="track"><div class="bar" id="bar"></div></div>

</div>
<script>
  var sp  = document.getElementById('sp');
  var bar = document.getElementById('bar');

  // Fade in on load
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      sp.classList.add('visible');
      // Start progress to 80% immediately
      if(bar) bar.style.width = '80%';
    });
  });

  // Receive fadeout signal from main process
  if(window.splash){
    window.splash.onFadeout(function(){
      // Snap bar to 100%, brief pause, then fade
      if(bar) bar.style.width = '100%';
      setTimeout(function(){
        sp.classList.remove('visible');
        sp.classList.add('fade-out');
        setTimeout(function(){
          window.splash.done();
        }, 660);
      }, 80);
    });
  }
</script>
</body>
</html>
