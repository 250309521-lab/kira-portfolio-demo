<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kira Takip Pro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html,body { width:100%; height:100%; background:#020b1e; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:#e2e8f0;
  -webkit-font-smoothing:antialiased; user-select:none; }

/* Stage fills the splash window (480x640). Fades out on the main-process signal. */
.sp{ position:fixed; inset:0; width:480px; height:640px; opacity:1;
  transition:opacity .55s cubic-bezier(.4,0,.2,1); }
.sp.fade-out{ opacity:0; }

@keyframes ktpFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes ktpHouseActivate {
  from { opacity: 0; transform-box: fill-box; transform: scale(0.95) translateY(4px); }
  to   { opacity: 1; transform-box: fill-box; transform: scale(1) translateY(0); }
}
/* Gem descent — anticipation → controlled descent → soft settle (translate3d, composited). */
@keyframes ktpGemDescend {
  0%   { transform: translate3d(0,-227px,0); opacity:0; }
  14%  { transform: translate3d(0,-200px,0); opacity:1; }
  100% { transform: translate3d(0,0,0);      opacity:1; }
}
@keyframes ktpGemFloat { 0%,100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-4px,0); } }
@keyframes ktpGemGlow    { 0%,100%{opacity:.22} 50%{opacity:.54} }
@keyframes ktpHouseGlow  { 0%,100%{opacity:.10} 50%{opacity:.28} }
@keyframes ktpSlotPulse  { 0%,100%{opacity:.28} 50%{opacity:.68} }
@keyframes ktpSlotActivate { 0%{opacity:0} 22%{opacity:1} 100%{opacity:0} }
@keyframes ktpChartReveal  { from { transform: scaleY(0); } to { transform: scaleY(1); } }
/* Receipt print — composited clip reveal (no height/layout thrash). */
@keyframes ktpReceiptReveal { 0% { clip-path: inset(0 0 100% 0); } 100% { clip-path: inset(0 0 0% 0); } }
@keyframes ktpReceiptLean   { 0% { transform: rotateX(13deg); } 100% { transform: rotateX(9.5deg); } }
@keyframes ktpReceiptShine {
  0%   { transform: translateY(-70%); opacity: 0; }
  35%  { opacity: .6; }
  100% { transform: translateY(280%); opacity: 0; }
}
@keyframes ktpRowIn      { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
@keyframes ktpShadowGrow { from { opacity:0; transform: translateX(-50%) scaleX(.5); } to { opacity:1; transform: translateX(-50%) scaleX(1); } }
@keyframes ktpSlotBeam   { 0%{opacity:0;transform:translateX(-50%) scaleX(.35)} 22%{opacity:1;transform:translateX(-50%) scaleX(1)} 70%{opacity:.85} 100%{opacity:.32;transform:translateX(-50%) scaleX(1)} }
@keyframes ktpCurlIn     { from { opacity:0; } to { opacity:1; } }
/* Progress dot — transform travel with opacity ramp (no `left`, no visible reset). */
@keyframes ktpProgressDot {
  0%   { transform: translate3d(-3px,0,0);  opacity: 0; }
  12%  { opacity: 1; }
  88%  { opacity: 1; }
  100% { transform: translate3d(234px,0,0); opacity: 0; }
}
@keyframes ktpProgressSweep {
  0%   { transform: translate3d(-60px,0,0); opacity: 0; }
  20%  { opacity: .5; }
  100% { transform: translate3d(240px,0,0); opacity: 0; }
}
@keyframes ktpWordmarkReveal { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ktpRingPulse    { 0%,100%{opacity:.18} 50%{opacity:.48} }
@keyframes ktpParticleFade { 0%,100%{opacity:.06} 50%{opacity:.70} }

/* Reduced motion: snap to final composed frame, no looping/intense motion. */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration:.01ms!important; animation-delay:0ms!important; animation-iteration-count:1!important; }
}
</style>
</head>
<body>

<div class="sp" id="sp">

  <!-- ── SVG: background / house / gem ── -->
  <svg style="position:absolute;top:0;left:0;width:480px;height:640px;" viewBox="0 0 480 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bgRad" cx="240" cy="275" r="330" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#0d2060"/><stop offset="45%" stop-color="#060e38"/><stop offset="100%" stop-color="#020a1e"/>
      </radialGradient>
      <radialGradient id="bloom" cx="240" cy="295" r="220" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#1d4ed8" stop-opacity=".22"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="streak" x1="240" y1="0" x2="240" y2="265" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#60a5fa" stop-opacity=".8"/><stop offset="65%" stop-color="#3b82f6" stop-opacity=".25"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="wallF" x1="143" y1="260" x2="143" y2="362" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#2d58c2"/><stop offset="100%" stop-color="#1a3a88"/>
      </linearGradient>
      <linearGradient id="wallS" x1="338" y1="260" x2="338" y2="362" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#1c3278"/><stop offset="100%" stop-color="#0e1e55"/>
      </linearGradient>
      <linearGradient id="roofF" x1="240" y1="192" x2="240" y2="260" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#4068d8"/><stop offset="100%" stop-color="#2a4eb2"/>
      </linearGradient>
      <linearGradient id="roofS" x1="260" y1="178" x2="340" y2="260" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#1b3278"/><stop offset="100%" stop-color="#132870"/>
      </linearGradient>
      <radialGradient id="hglow" cx="240" cy="315" r="108" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#4080ff"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="slotG" x1="192" y1="339" x2="288" y2="339" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#2563eb" stop-opacity=".08"/><stop offset="50%" stop-color="#60a5fa" stop-opacity=".55"/><stop offset="100%" stop-color="#2563eb" stop-opacity=".08"/>
      </linearGradient>
      <radialGradient id="gemG" cx="228" cy="148" r="58" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#fff"/><stop offset="28%" stop-color="#bfdbfe"/><stop offset="62%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".85"/>
      </radialGradient>
      <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#60a5fa" stop-opacity=".5"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="floor" cx="240" cy="370" r="160" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#1d4ed8" stop-opacity=".3"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
      </radialGradient>
      <filter id="gSm" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="gMd" x="-130%" y="-130%" width="360%" height="360%"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="gLg" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- BG -->
    <rect width="480" height="640" fill="url(#bgRad)" style="animation:ktpFadeIn .35s ease-out both;"/>
    <ellipse cx="240" cy="295" rx="280" ry="260" fill="url(#bloom)" style="animation:ktpFadeIn .65s ease-out .1s both;"/>

    <!-- GRID -->
    <g style="animation:ktpFadeIn 1s ease-out .25s both;">
      <line x1="0" y1="212" x2="480" y2="212" stroke="#1d4ed8" stroke-opacity=".08" stroke-width=".5"/>
      <line x1="0" y1="272" x2="480" y2="272" stroke="#1d4ed8" stroke-opacity=".08" stroke-width=".5"/>
      <line x1="0" y1="332" x2="480" y2="332" stroke="#1d4ed8" stroke-opacity=".06" stroke-width=".5"/>
      <line x1="0" y1="392" x2="480" y2="392" stroke="#1d4ed8" stroke-opacity=".05" stroke-width=".5"/>
      <line x1="96"  y1="0" x2="96"  y2="640" stroke="#1d4ed8" stroke-opacity=".055" stroke-width=".5"/>
      <line x1="192" y1="0" x2="192" y2="640" stroke="#1d4ed8" stroke-opacity=".055" stroke-width=".5"/>
      <line x1="240" y1="0" x2="240" y2="640" stroke="#1d4ed8" stroke-opacity=".08"  stroke-width=".5"/>
      <line x1="288" y1="0" x2="288" y2="640" stroke="#1d4ed8" stroke-opacity=".055" stroke-width=".5"/>
      <line x1="384" y1="0" x2="384" y2="640" stroke="#1d4ed8" stroke-opacity=".055" stroke-width=".5"/>
    </g>

    <!-- LIGHT STREAKS -->
    <g style="animation:ktpFadeIn .7s ease-out .3s both;">
      <line x1="226" y1="0" x2="226" y2="262" stroke="url(#streak)" stroke-width=".8" opacity=".5"/>
      <line x1="234" y1="0" x2="234" y2="262" stroke="url(#streak)" stroke-width="1.2" opacity=".72"/>
      <line x1="240" y1="0" x2="240" y2="262" stroke="url(#streak)" stroke-width="2" opacity=".95"/>
      <line x1="246" y1="0" x2="246" y2="262" stroke="url(#streak)" stroke-width="1.2" opacity=".72"/>
      <line x1="254" y1="0" x2="254" y2="262" stroke="url(#streak)" stroke-width=".8" opacity=".5"/>
      <line x1="213" y1="0" x2="218" y2="200" stroke="url(#streak)" stroke-width=".5" opacity=".22"/>
      <line x1="267" y1="0" x2="262" y2="200" stroke="url(#streak)" stroke-width=".5" opacity=".22"/>
    </g>

    <!-- PARTICLES -->
    <g style="animation:ktpFadeIn .5s ease-out .55s both;">
      <circle cx="178" cy="204" r="2"   fill="#60a5fa" style="animation:ktpParticleFade 3.2s ease-in-out .2s infinite;"/>
      <circle cx="314" cy="172" r="1.5" fill="#93c5fd" style="animation:ktpParticleFade 2.6s ease-in-out .8s infinite;"/>
      <circle cx="154" cy="278" r="1.5" fill="#60a5fa" style="animation:ktpParticleFade 3.8s ease-in-out 1.1s infinite;"/>
      <circle cx="348" cy="244" r="2"   fill="#3b82f6" style="animation:ktpParticleFade 2.9s ease-in-out .5s infinite;"/>
      <circle cx="202" cy="150" r="1"   fill="#bfdbfe" style="animation:ktpParticleFade 4.2s ease-in-out 1s infinite;"/>
      <circle cx="294" cy="136" r="1.5" fill="#93c5fd" style="animation:ktpParticleFade 3.5s ease-in-out 1.5s infinite;"/>
      <circle cx="162" cy="338" r="1"   fill="#60a5fa" style="animation:ktpParticleFade 2.8s ease-in-out .6s infinite;"/>
      <circle cx="334" cy="320" r="1"   fill="#60a5fa" style="animation:ktpParticleFade 3.6s ease-in-out 1.8s infinite;"/>
      <circle cx="188" cy="246" r="1.5" fill="#bfdbfe" style="animation:ktpParticleFade 2.4s ease-in-out .3s infinite;"/>
      <circle cx="298" cy="222" r="1"   fill="#93c5fd" style="animation:ktpParticleFade 3.0s ease-in-out 2s infinite;"/>
    </g>

    <!-- FLOOR GLOW + RINGS -->
    <g style="animation:ktpFadeIn .6s ease-out .65s both;">
      <ellipse cx="240" cy="372" rx="155" ry="22" fill="url(#floor)"/>
      <ellipse cx="240" cy="372" rx="172" ry="30" fill="none" stroke="#1d4ed8" stroke-width="1" stroke-opacity=".12" style="animation:ktpRingPulse 3.2s ease-in-out 0s infinite;"/>
      <ellipse cx="240" cy="372" rx="142" ry="24" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity=".22" style="animation:ktpRingPulse 3.2s ease-in-out .5s infinite;"/>
      <ellipse cx="240" cy="372" rx="114" ry="19" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity=".32" style="animation:ktpRingPulse 3.2s ease-in-out 1s infinite;"/>
    </g>

    <!-- HOUSE 3D -->
    <g style="transform-box:fill-box;transform-origin:50% 50%;animation:ktpHouseActivate .5s cubic-bezier(.2,0,.3,1) .2s both;">
      <path d="M 134,362 L 342,362 L 346,374 L 130,374 Z" fill="#11226a" stroke="#192e7a" stroke-width=".5"/>
      <path d="M 342,362 L 382,342 L 386,354 L 346,374 Z" fill="#0b1850" stroke="#13206a" stroke-width=".5"/>
      <path d="M 338,260 L 382,240 L 382,344 L 338,362 Z" fill="url(#wallS)" stroke="#152870" stroke-width=".5"/>
      <path d="M 240,192 L 338,260 L 382,240 L 280,172 Z" fill="url(#roofS)" stroke="#152870" stroke-width=".5"/>
      <path d="M 143,260 L 338,260 L 338,362 L 143,362 Z" fill="url(#wallF)" stroke="#1e3a8a" stroke-width=".5"/>
      <path d="M 143,260 L 338,260 L 338,362 L 143,362 Z" fill="url(#hglow)" opacity=".1" style="animation:ktpHouseGlow 2.8s ease-in-out .8s infinite;"/>
      <path d="M 143,260 L 240,192 L 338,260 Z" fill="url(#roofF)" stroke="#1e3a8a" stroke-width=".5"/>
      <path d="M 140,260 L 340,260 L 344,267 L 140,267 Z" fill="#1a3580" opacity=".85"/>
      <path d="M 340,260 L 382,240 L 386,247 L 344,267 Z" fill="#132260" opacity=".75"/>
      <line x1="143" y1="260" x2="240" y2="192" stroke="#93c5fd" stroke-width="2"   opacity=".75" filter="url(#gSm)"/>
      <line x1="240" y1="192" x2="338" y2="260" stroke="#60a5fa" stroke-width="1.5" opacity=".65" filter="url(#gSm)"/>
      <line x1="240" y1="192" x2="280" y2="172" stroke="#4472c4" stroke-width="1.5" opacity=".5"/>
      <line x1="280" y1="172" x2="382" y2="240" stroke="#2a4caa" stroke-width="1"   opacity=".38"/>
      <line x1="338" y1="260" x2="338" y2="362" stroke="#2a4caa" stroke-width=".75" opacity=".3"/>
      <line x1="134" y1="362" x2="342" y2="362" stroke="#2563eb" stroke-width=".75" opacity=".28"/>
      <g filter="url(#gSm)">
        <ellipse cx="240" cy="195" rx="36" ry="14" fill="#1a3282" stroke="#4472c4" stroke-width="1.5"/>
        <ellipse cx="240" cy="195" rx="23" ry="9"  fill="#020812" stroke="#2563eb"  stroke-width="1.2"/>
        <ellipse cx="240" cy="195" rx="23" ry="9"  fill="#3b82f6"  opacity=".2" style="animation:ktpSlotPulse 2s ease-in-out .7s infinite;"/>
      </g>
      <rect x="192" y="326" width="96" height="28" rx="4" fill="#020c1e" stroke="#2563eb" stroke-width="1.5"/>
      <line x1="194" y1="328" x2="286" y2="328" stroke="#60a5fa" stroke-width=".8" opacity=".75"/>
      <line x1="194" y1="328" x2="194" y2="352" stroke="#3b82f6" stroke-width=".4" opacity=".28"/>
      <line x1="286" y1="328" x2="286" y2="352" stroke="#3b82f6" stroke-width=".4" opacity=".28"/>
      <rect x="194" y="330" width="92" height="22" rx="3" fill="url(#slotG)" opacity=".38" style="animation:ktpSlotPulse 2s ease-in-out 1.2s infinite;"/>
    </g>

    <!-- Slot activation flash -->
    <ellipse cx="240" cy="342" rx="52" ry="10" fill="#3b82f6" opacity="0" style="animation:ktpSlotActivate 1.4s ease-out .85s both;filter:blur(8px);"/>

    <!-- GEM (descends from above) — outer = seat position, inner = smooth descent+float -->
    <g style="transform:translate(240px,162px);">
    <g style="will-change:transform,opacity;animation:ktpGemDescend 1.18s cubic-bezier(.16,.84,.24,1) .35s both, ktpGemFloat 3.6s ease-in-out 1.7s infinite;">
      <ellipse cx="0" cy="-2" rx="50" ry="54" fill="#3b82f6" opacity=".2" filter="url(#gLg)" style="animation:ktpGemGlow 2.8s ease-in-out 1.1s infinite;"/>
      <polygon points="-12,42 12,42 26,90 -26,90" fill="url(#cone)" opacity=".38" style="animation:ktpGemGlow 2.8s ease-in-out 1.1s infinite;"/>
      <path d="M0,-44 L-26,-8 L-30,10 L-18,28 L0,44 L18,28 L30,10 L26,-8 Z" fill="#60a5fa" opacity=".22" filter="url(#gMd)"/>
      <path d="M-18,28 L18,28 L0,44 Z"           fill="#2563eb" opacity=".9"/>
      <path d="M-30,10 L-18,28 L0,44 Z"          fill="#3b82f6" opacity=".82"/>
      <path d="M30,10 L18,28 L0,44 Z"            fill="#60a5fa" opacity=".80"/>
      <path d="M-26,-8 L26,-8 L30,10 L-30,10 Z"  fill="url(#gemG)" opacity=".92"/>
      <path d="M0,-44 L-26,-8 L-30,10 Z"         fill="#bfdbfe" opacity=".82"/>
      <path d="M0,-44 L26,-8 L30,10 Z"           fill="#dbeafe" opacity=".86"/>
      <path d="M0,-44 L-26,-8 L26,-8 Z"          fill="white"   opacity=".96"/>
      <path d="M0,-44 L-26,-8 L-30,10 L-18,28 L0,44 L18,28 L30,10 L26,-8 Z" fill="none" stroke="#93c5fd" stroke-width=".75" opacity=".75"/>
      <line x1="0" y1="-44" x2="0"   y2="44"  stroke="white"   stroke-width=".4" opacity=".28"/>
      <line x1="-26" y1="-8" x2="26" y2="-8"  stroke="white"   stroke-width=".5" opacity=".42"/>
      <line x1="-30" y1="10" x2="30" y2="10"  stroke="#bfdbfe" stroke-width=".4" opacity=".32"/>
      <line x1="-18" y1="28" x2="18" y2="28"  stroke="#93c5fd" stroke-width=".3" opacity=".26"/>
      <ellipse cx="-8" cy="-26" rx="9" ry="6"  fill="white" opacity=".82" style="transform:rotate(-18deg);transform-origin:-8px -26px;"/>
      <ellipse cx="5"  cy="-34" rx="4" ry="3"  fill="white" opacity=".55" style="transform:rotate(10deg);transform-origin:5px -34px;"/>
      <path d="M0,-44 L-26,-8 L-30,10 L-18,28 L0,44 L18,28 L30,10 L26,-8 Z" fill="none" stroke="#60a5fa" stroke-width="3" opacity=".32" filter="url(#gSm)"/>
    </g>
    </g>
  </svg>

  <!-- ══ 3D RECEIPT STAGE (perspective) — HERO ══ -->
  <div style="position:absolute;left:168px;top:332px;width:144px;height:200px;perspective:820px;perspective-origin:50% 0%;pointer-events:none;">
    <div style="position:absolute;left:50%;top:150px;width:108px;height:24px;background:radial-gradient(ellipse at 50% 50%,rgba(2,8,22,.55) 0%,transparent 72%);filter:blur(7px);opacity:0;animation:ktpShadowGrow .9s ease-out 1.15s both;"></div>
    <div style="position:absolute;left:50%;top:5px;width:98px;height:7px;border-radius:4px;background:linear-gradient(90deg,transparent,rgba(147,197,253,.95) 25%,rgba(219,234,255,1) 50%,rgba(147,197,253,.95) 75%,transparent);box-shadow:0 0 16px rgba(96,165,250,.85),0 0 4px rgba(219,234,255,.9);opacity:0;animation:ktpSlotBeam 1.7s ease-out .8s both;"></div>

    <!-- Receipt — outer wrapper holds the smooth 3D lean settle; inner clip reveals top→bottom (printer feed) -->
    <div style="position:absolute;left:50%;top:8px;width:96px;margin-left:-48px;height:150px;transform-origin:top center;transform:rotateX(13deg);will-change:transform;animation:ktpReceiptLean 1.45s cubic-bezier(.16,.72,.26,1) .9s both;">
    <div style="width:96px;height:150px;overflow:hidden;border-radius:0 0 7px 6px;clip-path:inset(0 0 100% 0);will-change:clip-path;animation:ktpReceiptReveal 1.5s cubic-bezier(.16,.72,.26,1) .9s both;">
      <div style="position:relative;width:100%;height:150px;background:linear-gradient(162deg,#e3efff 0%,#cfe2ff 32%,#bcd6fb 68%,#a6c3f0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.8),inset -1.5px 0 3px rgba(37,99,235,.2),inset 1.5px 0 3px rgba(255,255,255,.55);">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent);"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(118deg,transparent 30%,rgba(186,222,255,.4) 48%,transparent 62%);mix-blend-mode:screen;"></div>
        <div style="position:relative;padding:9px 10px 10px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;opacity:0;animation:ktpRowIn .4s ease-out 1.28s both;">
            <div style="width:13px;height:13px;border-radius:3px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 0 7px rgba(37,99,235,.55);flex-shrink:0;"></div>
            <div style="flex:1;height:5px;border-radius:2px;background:rgba(29,78,216,.72);"></div>
            <div style="width:22px;height:5px;border-radius:2px;background:rgba(37,99,235,.5);"></div>
          </div>
          <div style="height:1px;background:repeating-linear-gradient(90deg,rgba(37,99,235,.5) 0 4px,transparent 4px 7px);margin-bottom:8px;opacity:0;animation:ktpRowIn .35s ease-out 1.4s both;"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;opacity:0;animation:ktpRowIn .4s ease-out 1.46s both;">
            <div style="width:42%;height:3px;border-radius:2px;background:rgba(37,99,235,.44);"></div>
            <div style="width:24%;height:3px;border-radius:2px;background:rgba(29,78,216,.66);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;opacity:0;animation:ktpRowIn .4s ease-out 1.54s both;">
            <div style="width:50%;height:3px;border-radius:2px;background:rgba(37,99,235,.44);"></div>
            <div style="width:20%;height:3px;border-radius:2px;background:rgba(29,78,216,.66);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;opacity:0;animation:ktpRowIn .4s ease-out 1.62s both;">
            <div style="width:38%;height:3px;border-radius:2px;background:rgba(37,99,235,.44);"></div>
            <div style="width:28%;height:3px;border-radius:2px;background:rgba(29,78,216,.66);"></div>

<script>
  // Splash lifecycle: the main process signals 'splash:fadeout' once the main window
  // is ready; we fade the stage out, then notify main to close this window.
  (function () {
    var sp = document.getElementById('sp');
    if (window.splash && typeof window.splash.onFadeout === 'function') {
      window.splash.onFadeout(function () {
        if (sp) sp.classList.add('fade-out');
        setTimeout(function () {
          try { window.splash.done(); } catch (e) {}
        }, 560);
      });
    }
  })();
</script>
